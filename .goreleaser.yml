version: 2

project_name: nbu_exporter

before:
  hooks:
    # Assure que les dépendances sont à jour
    - go mod tidy

builds:
  # macOS build, kept as its own id so the Homebrew formula can reference a
  # darwin-only archive (Homebrew is published for macOS only).
  - id: macos
    main: ./main.go
    binary: "{{ .ProjectName }}"
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
  # Linux + Windows build, used for GitHub Release archives and Docker images.
  - id: others
    main: ./main.go
    binary: "{{ .ProjectName }}"
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  # darwin-only archive consumed by the Homebrew formula (brews.ids below).
  - id: macos
    ids:
      - macos
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - config.yaml
  # linux + windows archives for the GitHub Release.
  # Windows utilise automatiquement .zip, les autres .tar.gz
  - id: others
    ids:
      - others
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - config.yaml

sboms:
  - id: archive
    artifacts: archive
    cmd: syft
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "{{ .ArtifactName }}.sbom.cdx.json"

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    # cosign v2.6+/v4 installer defaults to the new bundle format (cert + sig in
    # one file); the old --output-certificate/--output-signature flags are ignored.
    signature: "${artifact}.bundle"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

dockers:
  - image_templates:
      - "ghcr.io/fjacquet/nbu_exporter:{{ .Version }}-amd64"
    ids:
      - others
    use: buildx
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/fjacquet/{{ .ProjectName }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    extra_files:
      - config.yaml
  - image_templates:
      - "ghcr.io/fjacquet/nbu_exporter:{{ .Version }}-arm64"
    ids:
      - others
    use: buildx
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/fjacquet/{{ .ProjectName }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
    extra_files:
      - config.yaml

docker_manifests:
  - name_template: "ghcr.io/fjacquet/nbu_exporter:{{ .Version }}"
    image_templates:
      - "ghcr.io/fjacquet/nbu_exporter:{{ .Version }}-amd64"
      - "ghcr.io/fjacquet/nbu_exporter:{{ .Version }}-arm64"
  - name_template: "ghcr.io/fjacquet/nbu_exporter:latest"
    image_templates:
      - "ghcr.io/fjacquet/nbu_exporter:{{ .Version }}-amd64"
      - "ghcr.io/fjacquet/nbu_exporter:{{ .Version }}-arm64"

brews:
  - # Homebrew formula is published for macOS only: it references the darwin-only
    # archive, so no on_linux block is generated.
    ids:
      - macos
    repository:
      owner: fjacquet
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/fjacquet/nbu_exporter"
    description: "Prometheus exporter for Veritas NetBackup"
    license: "MIT"
    test: |
      system "#{bin}/nbu_exporter", "--version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "README"
  groups:
    - title: Features
      regexp: "^feat:"
      order: 0
    - title: Bug Fixes
      regexp: "^fix:"
      order: 1
    - title: Others
      order: 999
