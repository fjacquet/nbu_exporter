services:
  nbu_exporter: # nosemgrep
    image: ghcr.io/fjacquet/nbu_exporter:latest
    container_name: nbu_exporter
    security_opt:
      - no-new-privileges:true
    ports:
      - "${NBU_EXPORTER_PORT:-2112}:2112"
    volumes:
      - ./config.yaml:/etc/nbu_exporter/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2112/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - NBU1_HOSTNAME=${NBU1_HOSTNAME:-master.my.domain}
      - NBU1_APIKEY=${NBU1_APIKEY:-}
    networks:
      - monitoring

  prometheus: # nosemgrep
    image: prom/prometheus:latest
    container_name: prometheus
    security_opt:
      - no-new-privileges:true
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/nbu.rules.yml:/etc/prometheus/rules/nbu.rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    depends_on:
      - nbu_exporter
    networks:
      - monitoring

  grafana: # nosemgrep
    image: grafana/grafana:latest
    container_name: grafana
    security_opt:
      - no-new-privileges:true
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/nbu-overview.json:/var/lib/grafana/dashboards/nbu-overview.json:ro
      - ./grafana/nbu-jobs.json:/var/lib/grafana/dashboards/nbu-jobs.json:ro
      - ./grafana/nbu-storage.json:/var/lib/grafana/dashboards/nbu-storage.json:ro
      - ./grafana/nbu-dataprotection.json:/var/lib/grafana/dashboards/nbu-dataprotection.json:ro
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-storage:
