# Prometheus Configuration for NBU Exporter

global:
  scrape_interval: 60s
  scrape_timeout: 30s
  evaluation_interval: 60s

rule_files:
  - /etc/prometheus/rules/nbu.rules.yml
  - /etc/prometheus/rules/rules-perclient.yml
  - /etc/prometheus/rules/rules-tape.yml
  - /etc/prometheus/rules/rules-multisite.yml

scrape_configs:
  # NBU Exporter metrics
  - job_name: 'netbackup'
    static_configs:
      - targets: ['nbu_exporter:9440']
    scrape_interval: 60s
    scrape_timeout: 30s
    metrics_path: '/metrics'

  # OpenTelemetry Collector metrics (optional)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    scrape_interval: 30s
    metrics_path: '/metrics'
