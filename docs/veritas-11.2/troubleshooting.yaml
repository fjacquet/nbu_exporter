        A log collection record is used to troubleshoot a NetBackup problem. It
        defines the criteria to use and the type of information to collect for
        troubleshooting, including the following: nbsu diagnostics, debug logs,
        the hosts from which to collect information, and the date and time range
        from which to collect information.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|`\

        Requires Operation:
        `|OPERATIONS|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|MANAGE-LOG|`
      tags:
        - Enhanced Log Collection
      requestBody:
        content:
          application/vnd.netbackup+json;version=14.0:
            schema: &ref_35
              type: object
              required:
                - data
              properties:
                data:
                  type: object
                  required:
                    - type
                    - attributes
                  properties:
                    type:
                      description: The request type.
                      type: string
                      enum:
                        - logCollectionRecordCreateEditRequest
                    attributes:
                      type: object
                      required:
                        - jobId
                        - description
                        - collectNbsu
                        - collectLogs
                        - collectForPrimary
                        - startTime
                        - endTime
                        - mediaServers
                        - clients
                      properties:
                        jobId:
                          type: string
                          description: >-
                            The job ID that is associated with the log
                            collection record.
                        supportCaseId:
                          type: string
                          description: The support case ID that was provided by the user.
                        description:
                          type: string
                          description: The description for this log collection record.
                        startTime:
                          type: string
                          format: datetime
                          description: >-
                            The start date and time for the log collection
                            record, as defined by the user or the job.
                        endTime:
                          type: string
                          format: datetime
                          description: >-
                            The end date and time for the log collection record,
                            as defined by the user or the job.
                        collectLogs:
                          type: boolean
                          description: >-
                            Indicates if debug logs information is collected.
                            Must be false when collectSelectiveLogs is true.
                        collectForPrimary:
                          type: boolean
                          description: >-
                            Indicates if logs are collected for the primary
                            server. Must be false when collectSelectiveLogs is
                            true.
                        collectSelectiveLogs:
                          type: boolean
                          description: >
                            Indicates if selective log file or folder path based
                            collection is enabled. When true, at least one host
                            (primary, media server, or client) must have
                            logPaths specified, and collectLogs,
                            collectForPrimary, and collectNbsu must all be
                            false. When false or absent, the existing
                            category-based collection flow is used.
                        primaryLogPaths:
                          type: array
                          description: >-
                            The list of specific log file or folder paths
                            selected for collection on the primary server. Only
                            applicable when collectSelectiveLogs is true.
                          items:
                            type: string
                        collectNbsu:
                          type: boolean
                          description: >-
                            Indicates if NBSU information is collected. Must be
                            false when collectSelectiveLogs is true.
                        mediaServers:
                          type: array
                          items: *ref_13
                        clients:
                          type: array
                          items: *ref_13
        description: The JSON body that contains the details of the log collection record.
        required: true
      responses:
        '201':
          description: Successfully created the log collection record.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: &ref_36
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - id
                      - type
                      - attributes
                    properties:
                      id:
                        type: string
                        description: The log record ID.
                      type:
                        type: string
                        enum:
                          - logCollectionRecordItem
                      attributes: *ref_15
        '400': *ref_4
        '401': *ref_1
        '406': *ref_2
        '415': *ref_9
        '500': *ref_3
  '/troubleshooting/log-collection-records/{recordId}':
    parameters:
      - *ref_6
    get:
      description: >
        **Available only in non-Cloud Scale deployments.**


        Get the log collection record details by record ID.

        This request only returns the log collection parameter details that are
        used to start log collection jobs. It does not return the actual log
        files that are collected when a log collection job runs.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|`\

        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
