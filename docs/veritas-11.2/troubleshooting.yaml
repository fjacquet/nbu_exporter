  '/troubleshooting/log-collection-records/{hostName}/log-files':
    x-in-development: false
    parameters:
      - in: path
        description: The name of the host to browse log directories on.
        name: hostName
        required: true
        schema:
          type: string
    get:
      description: >
        **Available only in non-Cloud Scale deployments.**


        Browse log directories on the specified host. Returns the files and
        directories at the specified path. Only whitelisted log paths under the
        NetBackup install directory are allowed.


        The path to browse is extracted from the filter query parameter using
        OData syntax, for example: `filter=(path eq
        '/usr/openv/netbackup/logs')`


        When no filter is provided, returns the predefined whitelisted base log
        directories.


        This API is restricted to the built-in Administrator role only. It is
        not available for custom roles.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|`\

        Requires Operation:
        `|OPERATIONS|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|BROWSE-LOG-DIRECTORY|`
      tags:
        - Enhanced Log Collection
      parameters:
        - name: filter
          description: >
            Filter criteria syntax is based on OData standards. Filtering is
            supported on the following attributes:

            |Name|Supported Operators|Description|Schema|

            |---|---|---|---|

            |path|eq|The absolute path of the directory to browse on the
            host.|string|
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: >-
            Successfully returned the list of files and directories at the
            specified path on the host.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items: &ref_49
                      type: object
                      description: >-
                        A file or directory entry returned from browsing log
                        directories on a host.
                      properties:
                        type:
                          type: string
                          description: The resource type.
                          enum:
                            - logCollectionFileDetails
                        id:
                          type: string
                          description: The resource identifier.
                        attributes:
                          type: object
                          properties:
                            name:
                              type: string
                              description: The name of the file or directory.
                            size:
                              type: integer
                              format: int64
                              description: >-
                                The size of the file in bytes. Zero for
                                directories.
                            modifiedDateInUTC:
                              type: string
                              format: date-time
                              description: >-
                                The last modification date and time of the file
                                or directory, in ISO 8601 format.
                            fileType:
                              type: string
                              description: The type of the entry.
                              enum:
                                - FILE
                                - FOLDER
                            isDisabled:
                              type: boolean
                              description: >-
                                Indicates whether the entry is disabled for
                                selection. When true, the entry is a
                                navigation-only container and cannot be selected
                                for log collection.
                      required:
                        - type
                        - id
                        - attributes
        '400':
          description: >
            The request is invalid. Possible reasons include: the specified host
            is not a known NetBackup primary, media server, or client; the
            filter expression is malformed; or the specified path is not under a
            whitelisted log directory.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_0
        '401': *ref_1
        '415': *ref_9
        '500': *ref_3
