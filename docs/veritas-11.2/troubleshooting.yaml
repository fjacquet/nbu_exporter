      responses:
        '200':
          description: Successfully returned the details of the log collection record.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: &ref_34
                description: The response schema for log collection record details.
                type: object
                required:
                  - data
                properties:
                  data: *ref_16
        '401': *ref_1
        '404': *ref_7
        '406': *ref_2
        '500': *ref_3
    delete:
      description: >
        **Available only in non-Cloud Scale deployments.**


        Deletes the log collection record along with all of its associated data.

        This data includes any evidence files or artifacts that were gathered
        during the log collection process.

        Use this operation with caution, as the record is deleted permanently
        and cannot be restored.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|`\

        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Enhanced Log Collection
      responses:
        '204':
          description: Successfully deleted the log collection record for the specified ID.
        '401': *ref_1
        '404': *ref_7
        '500': *ref_3
  '/troubleshooting/log-collection-records/{recordId}/collect':
    parameters:
      - *ref_6
    post:
      description: >
        **Available only in non-Cloud Scale deployments.**


        Initiates an asynchronous log collection for the specified record ID.
        NetBackup uses the parameters that are defined in the record to gather
        the relevant log files.


        The Location header in the response points to a status monitor API
        (`/admin/async-requests/{requestId}`) and that API can be used to
        monitor the status of the async request.

        When the asynchronous API call is complete the status monitor API
        redirects to `GET /troubleshooting/log-collection-records/{recordId}` to
        retrieve the result of the asynchronous collect API.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|`\

        Requires Operation:
        `|OPERATIONS|MANAGE|TROUBLESHOOTING|LOG_COLLECTION|MANAGE-LOG|`
      tags:
        - Enhanced Log Collection
      responses:
        '202':
          description: >-
            The log collection request has been accepted for the given record ID
            and the log collection process has started.
          headers:
            Location:
              description: >-
                The status monitor URL that is used to query the collection
                process status.
              schema:
                type: string
            Retry-After:
              description: >-
                The time when the results may be checked again, in ISO-8601
                format.
              schema:
                type: string
                format: date-time
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: &ref_43
                description: The response schema for log collection record collect action.
                type: object
                required:
                  - data
                properties:
                  data: &ref_44
                    type: object
                    description: Describes the log collection record collection response.
                    properties:
                      type:
                        type: string
                        description: The resource type.
                        enum:
                          - logCollectionCollectResponseInfo
                      id:
                        type: string
                        description: The record ID of the log collection record.
                      attributes: &ref_45
                        type: object
                        description: >-
                          Details about the current state of the log collection
                          process, including status code and message.
                        properties:
                          state:
                            type: integer
                            description: The state value returned from the collect action.
                          status:
                            description: The status of the current log collection process.
                            type: string
                            enum:
                              - IN-PROGRESS
                              - COMPLETED
                              - FAILED
                              - CREATED
                              - PARTIAL
                              - UNKNOWN
                          message:
                            type: string
                            description: >-
                              The status message that describes the current
                              state that was returned from the collect action.
                    required:
                      - type
                      - id
                      - attributes
        '401': *ref_1
        '404': *ref_7
        '406': *ref_2
        '409':
          description: Evidence was already collected for this log record.
          content:
            'application/vnd:netbackup+json;version=14.0':
              schema: *ref_0
        '429':
          description: A log collection is already active. Please try again later.
        '500': *ref_3
