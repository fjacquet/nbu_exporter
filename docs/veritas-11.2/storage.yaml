                              default: 0
                              minimum: 0
                            cleaningsRemaining:
                              type: integer
                              description: >
                                Specifies as to how many times more the cleaning
                                media can be used. Zero (default) is the same as
                                unlimited.<br>

                                Note: This attribute is only used for volumes of
                                cleaning media type.
                              default: 0
                              minimum: 0
                            volumeGroupName:
                              type: string
                              maxLength: 25
                              description: Volume group that volume belongs to.
                              example: myVolumeGroup
                              default: '---'
                            volumePoolNumber:
                              type: integer
                              description: Volume pool number that volume belongs to.
                              minimum: 0
                            description:
