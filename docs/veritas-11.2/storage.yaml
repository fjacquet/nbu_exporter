                              type: integer
                              example: 4
                            suspendMediaEndDay:
                              type: integer
                              example: 9
                            ejectMode:
                              type: string
                              description: >
                                The eject mode.


                                Possible values:\

                                DEFERRED - Eject manually.\

                                IMMEDIATE - Eject automatically at the end of
