    post:
      description: >
        Creates a storage unit in NetBackup. Storage unit creation for
        BASIC_DISK is not supported.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-UNITS|`\

        Requires Operation: `|OPERATIONS|ADD|`
      tags:
        - Storage Units
      requestBody:
        content:
          application/vnd.netbackup+json;version=14.0:
            schema: &ref_191
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      description: The type of entity to create.
                      enum:
                        - storageUnit
                    attributes: &ref_189
                      type: object
                      properties:
                        name:
                          type: string
                          description: The name of the storage unit.
                        useAnyAvailableMediaServer:
                          description: >-
                            If set to `true`, any available media server can be
                            used. By default, the parameter is set to true.
                          type: boolean
                          default: true
                        mediaServerDetails:
                          type: array
                          description: >-
                            The list of media servers associated with the
                            storage server.
                          items: &ref_23
                            type: object
                            description: Details of the media server.
                            properties:
                              name:
                                type: string
                                description: Name of the media server.
                            required:
                              - name
                        maxFragmentSizeMegabytes:
                          description: >
                            The maximum fragment size in MB. The default and
                            maximum value for MSDP storage is 51200 MB. The
                            default and maximum value for Tape storage is
                            1048576 MB. The minimum value for Tape storage is 50
                            MB. The default and maximum value for other storage
                            types is 524288 MB.
                          type: integer
                          format: int64
                          minimum: 20
                        maxConcurrentJobs:
                          description: >-
                            The maximum number of concurrent jobs. This is not
                            valid for tape storage units. Tape storage units use
                            maxConcurrentDrives instead.
                          type: integer
                          default: 1
                          maximum: 4096
                          minimum: 0
                        maxConcurrentDrives:
                          description: >-
                            The maximum number of concurrent drives. This is
                            only valid for tape storage units.
                          type: integer
                          default: 1
                          maximum: 256
                          minimum: 0
                        onDemandOnly:
                          description: >-
                            If set to `true`, the storage unit is available
                            on-demand.
                          type: boolean
                          default: false
                        useWorm:
                          type: boolean
                          default: false
                          description: >
                            If set to `true`, the WORM (write once read many)
                            feature is configured for the storage unit.

                            This feature cannot be reset to false once it is set
                            to true.
                        storageCategory:
                          type: string
                          description: >-
                            Used to provide the storage unit storage category
                            when not providing a disk pool relationship.
                            BASIC_DISK and TAPE are the only storage categories
                            that do not require a disk pool relationship. If
                            NONE is specified then the storage unit storage
                            category will be derived from the required disk pool
                            relationship.
                          enum:
                            - BASIC_DISK
                            - TAPE
                            - NONE
                        highWaterMark:
                          description: >-
                            Applies only to BASIC_DISK storage units. This
                            threshold triggers the storage unit out of space
                            actions. The high water mark must be greater than
                            the low water mark setting.
                          type: integer
                          default: 98
                          maximum: 100
                          minimum: 2
                        lowWaterMark:
                          description: >-
                            Applies only to BASIC_DISK storage units. Once the
                            high water mark is reached space is created on the
                            storage unit until the low water mark is reached.
                          type: integer
                          default: 80
                          maximum: 99
                          minimum: 1
                        robotType:
                          type: string
                          description: >-
                            The type of robot that contains this drive. For
                            example, TL4 or ACS.
                          enum:
                            - NA
                            - NOT_ROBOTIC
                            - ACS
                            - TLD
                        robotNumber:
                          type: integer
                          description: 'A unique, logical number that identifies the robot.'
                        density:
                          type: string
                          description: The media density.
                          enum:
                            - DQSCSI
                            - DHC8MM
                            - D800
                            - D1600
                            - D3200
                            - D6250
                            - DHCART
                            - DDD8MM
                            - DT120
                            - DODISKWM
                            - DODISKWO
                            - DCDD8MM
                            - D4MM
                            - DDLT
                            - DHCART2
                            - DDLT2
                            - D8MM
                            - D8MM2
                            - DD2
                            - DDTF
                            - DHCART3
                            - DDLT3
                            - D8MM3
                            - NA
                          example: DHCART
                        multiplexing:
                          type: integer
                          description: >
                            The maximum multiplexing factor. Multiplexing sends
                            concurrent, multiple backups from one or more
                            clients to a single drive. Only applies when the
                            storageCategory is set to TAPE. The default value is
                            1, meaning no multiplexing.
                          default: 1
                          minimum: 1
                          maximum: 32
                      required:
                        - name
                    relationships:
                      type: object
                      properties:
                        diskPool:
                          type: object
                          properties:
                            data: *ref_18
                  required:
                    - type
                    - attributes
              required:
                - data
        description: Storage unit configuration details.
        required: true
      responses:
