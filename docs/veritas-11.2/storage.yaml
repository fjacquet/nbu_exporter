                                  active management of disk groups.
                                  ACTIVE_SERVERS - Allow active management of
                                  storage servers. ROVING_VOLUMES - Active
                                  mount/unmounts for disk volumes. COPY_EXTENTS
                                  - Allow optimized duplication. ADMIN_UP -
                                  Administrative state is UP. INTERNAL_UP -
                                  Internal state is UP. SPAN_IMAGES - Allow
                                  images to span disk volumes. BASIC_STAGING -
                                  Allow basic image staging. LIFE_CYCLE - Allow
                                  image life cycle management.
                                  CAPACITY_MANAGEMENT - Allow capacity
                                  management. FRAGMENT_IMAGES - Allow image
                                  fragmentation. CATALOG_BACKUP - Allow catalog
                                  backups. CPR - Allow checkpoint / restart.
                                  RANDOM_WRITES - Allow random write access.
                                  FT_TRANSFER - Allow access through FT channel.
                                  PREF_RESTORE - Preferred use for restores.
                                  REQ_RESTORE - Required use for restores.
                                  REQ_DUPLICATE - Required use for duplications.
                                  CAPACITY_MANAGED_RETENTION - Allow capacity
                                  managed retention.
                                  CAPACITY_MANAGED_JOB_QUEUING - Allow capacity
                                  managed job queuing. OPTIMIZED_IMAGE - Allow
                                  virtual image construction. METADATA -
                                  Describe client data during backup.
                                  QUEUE_ON_DOWN - Queue jobs when server status
                                  is down. INSTANT_ACCESS - Allow instant access
                                  to backup image. DEDUPE_TO_CLD - Allow
                                  deduplication to cloud. PRIMARY - Allow
