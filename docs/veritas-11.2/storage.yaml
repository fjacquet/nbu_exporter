    parameters:
      - name: requestId
        in: path
        required: true
        description: >-
          The request ID generated in the location header of
          bulk-tape-media-requests api.
        schema:
          type: string
    get:
      description: >
        Retrieves the status of a bulk tape media request specified by
        `requestId`.


        If the bulk request has completed (200 or 207 response status codes),
        regardless of

        the outcome of the individual volume records, after this call, that
        request and all of its records

        will immediately be deleted and can no longer be retrieved.

         **Access Control**\
         Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
         Namespace: `|STORAGE|TAPE-MEDIA|`\
         Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Tape Media
      responses:
        '200':
          description: >-
            Successfully processed request on all volumes. There were no errors
            found.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_10
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 1
                      type: volumeInfo
                    - httpStatus: 204
                      id: 2
                      type: volumeInfo
        '202':
          description: Bulk request is in progress.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_10
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 202
                      id: 1
                      type: volumeInfo
                    - httpStatus: 202
                      id: 2
                      type: volumeInfo
        '207':
          description: >
            The bulk request has completed, but one or more volumes in the bulk
            request could not be processed.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_93
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 404
                      id: 1
                      type: volumeInfo
                      errors:
                        errorCode: 1
                        errorMessage: Volume does not exist
                    - httpStatus: 204
                      id: 2
                      type: volumeInfo
        '401': *ref_2
        '404': *ref_3
        '406': *ref_5
        '500': *ref_4
    delete:
      description: >
        Cancels an ongoing bulk volume request, specified by `requestId`, and
        retrieves its status.


        Regardless of the outcome of the individual volume records, after this
        call, that request

        and all of its records will immediately be deleted and can no longer be
        retrieved.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|TAPE-MEDIA|`\

        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Tape Media
      responses:
        '207':
          description: >
            The bulk request has been cancelled. The operation may have already
            executed for some

            of the volumes.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_10
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 200
                      id: ABC001
                      type: volumeInfo
                    - httpStatus: 422
                      id: ABC002
                      type: volumeInfo
        '401': *ref_2
        '404': *ref_3
        '406': *ref_5
        '409':
          description: The bulk request has already completed.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_10
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 1
                      type: volumeInfo
                    - httpStatus: 204
                      id: 2
                      type: volumeInfo
        '500': *ref_4
