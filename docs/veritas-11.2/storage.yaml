                                - DLT2_CLN
                                - HCART3
                                - HC3_CLN
                                - DLT3
                                - DLT3_CLN
                              example: HCART
                            maxMounts:
                              type: integer
                              description: >
                                Specifies maximum number of mounts that are
                                allowed for this volume. Zero (default) is the
