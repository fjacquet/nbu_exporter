        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|TAPE-MEDIA|VAULT|`\

        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Vault Management
      parameters:
        - name: filter
          description: >
            Filter criteria syntax is based on OData standards. Filtering is
            supported on the following attributes:

            |Name|Supported Operators|Description|Schema|

            |---|---|---|---|

            |profileName|eq ne and or not () contains endswith startswith
            tolower toupper|The name of the profile.|string|

            |selectionAttributes/imageProperties/clients|eq ne and or not ()
            contains endswith startswith tolower toupper|The client names of
            backups to vault.|string|

            |selectionAttributes/imageProperties/backupTypes|eq ne and or not ()
            contains endswith startswith tolower toupper|The backup types to
            vault.|string|

            |selectionAttributes/imageProperties/mediaServers|eq ne and or not
            () contains endswith startswith tolower toupper|The media servers of
            backups.|string|

            |selectionAttributes/imageProperties/backupPolicies|eq ne and or not
            () contains endswith startswith tolower toupper|The backup
            policies.|string|

            |selectionAttributes/imageProperties/schedules|eq ne and or not ()
            contains endswith startswith tolower toupper|The schedules of backup
            policies.|string|

            |selectionAttributes/imageLocation/sourceVolumeGroups|eq ne and or
            not () contains endswith startswith tolower toupper|The volume
            groups.|string|

            |selectionAttributes/imageLocation/volumePools|eq ne and or not ()
            contains endswith startswith tolower toupper|The volume
            pools.|string|
          in: query
          required: false
          schema:
            type: string
        - name: sort
          description: >
            The value of this parameter must be a comma-separated list of sort
            fields in the order they are to be sorted. Prefix with '-' for
            descending order.

            Sorting is supported on the following attributes:

            |Name|

            |---|

            |profileName|

            |selectionAttributes.imageProperties.clients|

            |selectionAttributes.imageProperties.backupTypes|

            |selectionAttributes.imageProperties.mediaServers|

            |selectionAttributes.imageProperties.backupPolicies|

            |selectionAttributes.imageProperties.schedules|

            |selectionAttributes.imageLocation.sourceVolumeGroups|

            |selectionAttributes.imageLocation.volumePools|
          in: query
          required: false
          schema:
            type: string
