        content:
          application/vnd.netbackup+json;version=14.0:
            schema: &ref_343
              type: object
              required:
                - data
              properties:
                data: &ref_344
                  type: object
                  required:
                    - type
                    - attributes
                  properties:
                    type:
                      type: string
                      enum:
                        - createVolumeInfosRequest
                    attributes:
                      type: object
