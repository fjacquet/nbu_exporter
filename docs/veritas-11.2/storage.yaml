                  data: &ref_430
                    type: object
                    description: 'JSON:API resource object for fault tolerance options.'
                    required:
                      - type
                      - id
                      - attributes
                    properties:
                      type:
                        type: string
                        description: The resource type identifier.
                        enum:
                          - directIOFaultToleranceOptions
                        example: directIOFaultToleranceOptions
                      id:
                        type: integer
                        example: 200
                      attributes:
                        type: object
                        description: Fault tolerance options attributes.
                        properties:
                          failureDomainCount:
                            type: integer
                            description: The number of failure domains in the cluster.
                            example: 3
                          faultToleranceOptions:
                            type: array
                            description: List of available fault tolerance options.
                            items: &ref_431
                              type: object
                              description: A fault tolerance option configuration.
                              properties:
                                faultTolerance: &ref_124
                                  type: object
