                              type: string
                              description: The type of the storage unit.
                            storageSubType:
                              type: string
                              description: The subtype of the storage unit.
                            storageServerType:
                              type: string
                              description: >-
                                The type of the storage server associated with
                                this storage unit.
                            storageCategory:
                              type: string
                              description: The category of the storage unit.
