                                        type: string
                                        format: date
                                        description: >
                                          The specific dates to include, in ISO
                                          8601 format. Note: This date represents
                                          the time zone for the primary server.
                                          For example, "2022-10-25T00:00:00.000Z"
                                          is equivalent to "10/25/2022 12:00:00
                                          AM" in the primary server's time zone.
                                        example: 2023-08-24T13:13:00.000Z
                                excludeDates:
                                  type: object
                                  description: >-
                                    Recurring days of the week recurring days of
                                    the month and exact dates on which this
                                    policy does not run. This parameter only
                                    applies to calendar-based schedules
                                  properties:
                                    lastDayOfMonth:
                                      type: boolean
                                      description: >-
                                        Indicates if the last day of the month
                                        is excluded.
                                    recurringDaysOfMonth:
                                      type: array
                                      description: Recurring days of the month.
                                      items:
                                        type: integer
                                        description: >-
                                          The number of a specific day of the
                                          month starting with 1.
                                      maxItems: 31
                                    recurringDaysOfWeek:
                                      type: array
                                      description: Recurring days of a week.
                                      items:
                                        type: string
                                        description: >-
                                          A specific day of a specific week.  The
                                          format is \WEEK:DAY\. WEEK is the number
                                          of the week within the month.  Possible
                                          values for WEEK are 1 2 3 and 4. DAY is
                                          the day of the week.  Possible values
                                          for DAY are 1 (Sunday) through 7
                                          (Saturday).
                                      maxItems: 35
                                    specificDates:
                                      type: array
                                      description: A list of specific dates.
                                      items:
                                        type: string
                                        format: date
                                        description: >
                                          The specific dates to exclude, in ISO
                                          8601 format. Note: This date represents
                                          the time zone for the primary server.
                                          For example, "2022-10-25T00:00:00.000Z"
                                          is equivalent to "10/25/2022 12:00:00
                                          AM" in the primary server's time zone.
                                        example: 2023-08-24T13:13:00.000Z
                                startWindow:
                                  type: array
                                  description: >
                                    The window during which the backup is
                                    allowed to start.  Each day of the week is
                                    defined independently.  Entry 1 is Sunday,
                                    entry 2 is Monday, and so on.
                                  maxItems: 7
                                  items:
                                    type: object
                                    properties:
                                      dayOfWeek:
                                        type: integer
                                        description: >
                                          The day of the week the backup window
                                          starts.  Possible values for DAY are 1
                                          (Sunday) through 7 (Saturday).
                                        minimum: 1
                                        maximum: 7
                                      durationSeconds:
                                        type: integer
                                        description: >
                                          The start time of the backup window,
                                          expressed in seconds elapsed since the
                                          beginning of the day.
                                        minimum: 0
                                        maximum: 86399
                                      startSeconds:
                                        type: integer
                                        description: >-
                                          The duration of the backup window
                                          expressed in seconds.
                                        minimum: 1
                                        maximum: 86400
                                    required:
                                      - dayOfWeek
                                      - durationSeconds
                                      - startSeconds
                                backupCopies:
                                  type: object
                                  description: >-
                                    Specifies the number of backup copies. The
                                    maximum number of copies allowed is 4. Entry
                                    1 reflects the primary schedule copy which
                                    is always enabled. Entries 2 3 or 4 reflect
                                    additional copies which are optional.
                                  properties:
                                    copies:
                                      type: array
                                      description: The list of copy information.
                                      items:
                                        type: object
                                        properties:
                                          failStrategy:
                                            type: string
                                            description: >-
                                              The approach taken if a particular image
                                              fails to copy.
                                            enum:
                                              - CONTINUE
                                              - FAIL_ALL_COPIES
                                          mediaOwner:
                                            type: string
                                            description: >-
                                              The media server or group that owns this
                                              copy. The value can be the name of a
                                              server group, or a value of "*ANY*"
                                              causes NetBackup to choose the media
                                              owner. A value of "*NONE*" causes the
                                              media server that writes the image to be
                                              the media owner.
                                          retentionLevel:
                                            type: integer
                                            description: The retention level for the copy.
                                            minimum: 0
                                            maximum: 100
                                          retentionPeriod:
                                            type: object
                                            description: >-
                                              The retention period for the copy to be
                                              specified in quantity and units.
                                            properties:
                                              value:
                                                type: integer
                                                description: >-
                                                  The value of the retention period in
                                                  terms of unit defined.
                                              unit:
                                                type: string
                                                description: >-
                                                  The unit of the retention period in
                                                  terms of timefor exampleweeksmonthsyears
                                                  and so on.
                                                enum:
                                                  - SECONDS
                                                  - MINUTES
                                                  - HOURS
                                                  - DAYS
                                                  - WEEKS
                                                  - MONTHS
                                                  - YEARS
                                                  - INFINITE
                                          storage:
                                            type: string
                                            description: >-
                                              The name of the storage unit that is
                                              associated with the copy. The value can
                                              be the name of an existing storage unit,
                                              or a value of "*NULL*" enables any
                                              available storage unit.
                                          volumePool:
                                            type: string
                                            description: >-
                                              The name of the volume pool that is
                                              associated with the copy.
                                    priority:
                                      type: integer
                                      description: >-
                                        The priority of jobs that are associated
                                        with any additional copies that are
                                        specified. The higher the number the
                                        higher the priority (relative to other
                                        NetBackup jobs).  Note this has no
                                        impact on the primary copy.
                                      minimum: 0
                                      maximum: 99999
