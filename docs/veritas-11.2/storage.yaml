        - DLT3_CLN
    selectionTypeEnum:
      enum:
        - INCLUDE_ALL
        - INCLUDE
        - EXCLUDE_ALL
    vaultSelectionTypeEnum:
      enum:
        - ALL_VAULTS
        - VAULT
    patchBulkRobotRequest: *ref_125
    patchBulkRobotElement: *ref_126
    robotContentsRequest: *ref_127
    getRobotResponse:
      type: object
      required:
        - data
      properties:
        data: &ref_128
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: >-
                The robot name, which consists of the robot type and its number.
                For example, TLD(4).
            type:
              type: string
              enum:
                - robot
            attributes: &ref_135
              type: object
              description: The properties of the robot.
              required:
                - number
                - deviceHost
                - robotType
              properties:
                number:
                  type: integer
                  description: >-
                    The unique, logical identification number for the robotic
                    library.
                deviceHost:
                  type: string
                  description: The host to which the device is attached.
                displayHostName:
                  type: string
                  description: >
                    The host name of the robot to display.

                    If the robot is in cluster, the display name would be like:
                    ClusterName (DeviceHostName).
                volumeDatabaseHost:
                  type: string
                  description: >-
                    The database host which stores volume information associated
                    with this robot.
                robotType:
                  type: string
                  description: The type of robot.
                  enum:
                    - NA
                    - NOT_ROBOTIC
                    - ACS
                    - TLD
                roboticPath:
                  type: string
                  description: >
                    For the robots that are attached to UNIX hosts: Specifies
                    the path for the robot if one exists. For example,
                    /dev/sg/c2t5l0.

                    This property does not apply to Windows hosts.
                ndmpHost:
                  type: string
                  description: The name of the NDMP host to which the robot is attached.
                enabled:
                  type: boolean
                  description: Indicates if the path to the robot is enabled.
                port:
                  type: integer
                  nullable: true
                  description: >
                    For the robots that are attached to UNIX hosts: Specifies
                    the SCSI port number of the robot.

                    This property applies to NetBackup Windows servers only.
                bus:
                  type: integer
                  nullable: true
                  description: >
                    For the robots that are attached to UNIX hosts: Specifies
                    the SCSI bus number of the robot.

                    This property applies to NetBackup Windows servers only.
                target:
                  type: integer
                  nullable: true
                  description: >
                    For the robots that are attached to UNIX hosts: Specifies
                    the SCSI target number (or SCSI ID) of the robot.

                    This property applies to NetBackup Windows servers only.
                lun:
                  type: integer
                  nullable: true
                  description: >
                    For the robots that are attached to UNIX hosts: Specifies
                    the SCSI logical unit number of the robot.

                    This property applies to NetBackup Windows servers only.
                serialNumber:
                  type: string
                  description: >-
                    Specifies the robot serial number, if the robot reports this
                    information.
                robotControlHost:
                  type: string
                  description: >-
                    The name of the control host, if a remote host controls the
                    robot.
                inquiryInfo:
