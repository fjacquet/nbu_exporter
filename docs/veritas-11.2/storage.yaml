                                  items:
                                    type: string
                                    description: The disk pool.
                                    example: diskPool1
                                sourceVolumeGroupsSelection:
                                  type: string
                                  enum:
                                    - INCLUDE_ALL
                                    - INCLUDE
                                    - EXCLUDE_ALL
                                  default: INCLUDE_ALL
                                  example: INCLUDE
                                sourceVolumeGroups:
                                  type: array
                                  description: >-
                                    The list of volume groups to include or
                                    exclude for vault.
                                  items:
                                    type: string
                                    description: The volume group.
                                    example: 000_00000_TLD
                                volumePoolsSelection:
                                  type: string
                                  enum:
                                    - INCLUDE_ALL
                                    - INCLUDE
                                    - EXCLUDE_ALL
                                  default: INCLUDE_ALL
                                  example: INCLUDE
                                volumePools:
                                  type: array
                                  description: >-
                                    The list of volume pools to include or
                                    exclude for vault.
                                  items:
                                    type: string
                                    description: The volume pool.
                                    example: pool1
                        catalogBackupAttributes: &ref_107
                          type: object
                          required:
                            - catalogBackupPolicy
                            - vaultCatalogBackupSchedule
                          properties:
                            catalogBackupPolicy:
                              type: string
                              description: The catalog backup policy.
                              example: CatalogBackup
                            vaultCatalogBackupSchedule:
                              type: string
                              description: The vault catalog backup schedule.
                              example: schedule
