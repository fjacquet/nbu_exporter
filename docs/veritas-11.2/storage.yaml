                data:
                  type: array
                  minItems: 1
                  maxItems: 1024
                  items: &ref_378
                    type: object
                    required:
                      - id
                      - type
                    properties:
                      type:
                        type: string
                        enum:
                          - vaultRobot
                      id:
                        type: string
                        description: The id of the vault robot.
            example:
              data:
                - id: 1
                  type: vaultRobot
                - id: 2
                  type: vaultRobot
        description: Vault robot IDs to be deleted.
        required: true
      responses:
        '202':
          description: Bulk request accepted.
          headers:
            Location:
              description: >
                A link to the status monitor of the request.


                After the request is submitted, the maximum period that the
                status monitor will be retrievable

                is 24 hours. Canceling the request or restarting the Web server
                will immediately

                make the status monitor invalid.
              schema:
                type: string
                format: url
        '400': *ref_7
        '401': *ref_2
        '406': *ref_5
        '413':
          description: >-
            The request to delete vault robots contains too many items (>1024).
            Break up the request into multiple batches and resubmit.
        '415': *ref_8
        '429':
          description: >-
            Too many vault robot requests are already running (>32). Wait for
            one to complete before resubmitting.
