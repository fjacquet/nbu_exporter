                          type: string
                          description: >
                            The style to use to name the range of volumes. Using
                            the pattern, NetBackup names the remaining volumes
                            by incrementing the digits.<br>

                            Note: Should be NONE when volumeCounts is 1. Cannot
                            be NONE when volumeCounts is greater than 1.
                          enum:
                            - NONE
                            - CHAR0DIG6
                            - CHAR1DIG5
                            - CHAR2DIG4
                            - CHAR3DIG3
                            - CHAR4DIG2
                          example: CHAR3DIG3
                        volume: &ref_345
                          type: object
