                                      - DIFFERENTIAL_INCREMENTAL_BACKUP
                                      - CUMULATIVE_INCREMENTAL_BACKUP
                                      - USER_BACKUP
                                      - USER_ARCHIVE
                                      - DB_APPLICATION_BACKUP
                                      - DB_ARCHIVE_REDO_LOG_BACKUP
                                      - DB_TRANSACTION_LOG_BACKUP
