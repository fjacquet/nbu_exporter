  '/storage/storage-servers/{storageServerId}/msdp-reports/cache-load-status':
    get:
      x-in-development: false
      description: >
        Retrieves the MSDP (Media Server Deduplication Pool) cache loading
        status 

        for the specified storage server. This includes information about
        predictive cache 

        and main FP cache loading progress, cache usage statistics, and loading
        timestamps.


        The response includes:

        - Current time of the cache status

        - Loading report with cache type, source, status, and progress
        percentage

        - Cache usage details including total, allocated, and used cache sizes


        Supported cache types:

        - predictive-cache: Predictive cache for deduplication

        - main-fpcache: Main fingerprint cache

        - main-fpcache+predictive-cache: Both cache types


        Cache Loading status:

        - complete: Cache loading has finished

        - loading: Cache loading is in progress

        - disabled: Cache loading is disabled


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-SERVERS|MSDP-REPORTS|`\

        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Storage Servers
      parameters:
        - name: storageServerId
          in: path
          description: |
            The ID of the storage server.
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved MSDP cache load status.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: &ref_282
                type: object
                properties:
                  data: &ref_283
                    type: object
                    description: MSDP cache load status data object.
                    properties:
                      type:
                        type: string
                        description: Resource type identifier.
                      id:
                        type: string
                        description: The unique identifier of the storage server.
                      attributes: &ref_284
                        type: object
                        description: MSDP cache load status attributes.
                        properties:
                          currentTime:
                            type: string
                            description: >-
                              Current timestamp in ISO 8601 format or "N/A" if
                              unavailable.
                          loadingReport: &ref_285
                            type: object
                            description: Cache loading report details.
                            properties:
                              cacheType:
                                type: string
                                description: Type of cache being loaded.
                                enum:
                                  - predictive-cache
                                  - main-fpcache
                                  - main-fpcache+predictive-cache
                              loadingSource:
                                type: string
                                description: Source of cache loading data.
                                enum:
                                  - imageset+workloads
                                  - datastore+workloads
                                  - workloads
                              loadingStatus:
                                type: string
                                description: Current loading status.
                                enum:
                                  - complete
                                  - loading
                                  - disabled
                              cacheLoadPercentage:
                                type: number
                                format: double
                                description: Cache loading completion percentage (0-100).
                              loadingStartTime:
                                type: string
                                description: >-
                                  Cache loading start time or "N/A" if not
                                  started.
                              loadingEndTime:
                                type: string
                                description: >-
                                  Cache loading end time or "N/A" if loading in
                                  progress or disabled.
                            required:
                              - cacheType
                              - loadingSource
                              - loadingStatus
                              - cacheLoadPercentage
                              - loadingStartTime
                              - loadingEndTime
                          cacheUsage:
                            type: array
                            description: >-
                              Array of cache usage statistics (can contain
                              multiple cache types).
                            items: &ref_286
                              type: object
                              description: >-
                                Cache usage statistics for a specific cache
                                type.
                              properties:
                                cacheType:
                                  type: string
                                  description: Type of cache.
                                  enum:
                                    - predictive-cache
                                    - main-fpcache
                                totalCacheSize:
                                  type: integer
                                  format: int64
                                  description: Maximum cache size in bytes.
                                allocatedCacheSize:
                                  type: integer
                                  format: int64
                                  description: Allocated cache size in bytes.
                                usedCacheSize:
                                  type: integer
                                  format: int64
                                  description: Used cache size in bytes.
                              required:
                                - cacheType
                                - totalCacheSize
                                - allocatedCacheSize
                                - usedCacheSize
                        required:
                          - currentTime
                          - loadingReport
                          - cacheUsage
                    required:
                      - type
                      - id
                      - attributes
                required:
                  - data
        '400': *ref_7
        '401': *ref_2
        '404':
          description: Storage server not found.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_0
