            |storageSubType|

            |useAnyAvailableMediaServer|

            |accelerator|

            |replicationCapable|

            |replicationSourceCapable|

            |replicationTargetCapable|

            |snapshot|

            |mirror|

            |independent|

            |primary|

            |instantAccessEnabled|

            |scaleOutEnabled|

            |isCloudSTU|

            |freeCapacityBytes|

            |totalCapacityBytes|

            |usedCapacityBytes|

            |maxFragmentSizeMegabytes|

            |maxConcurrentJobs|

            |maxConcurrentDrives|

            |onDemandOnly|

            |useWorm|

            |wormCapable|

            |robotType|

            |robotNumber|

            |density|

            |multiplexing|

            |path|

            |ndmpHost|

            |enableBlockSharing|

            |transferThrottle|

            |fileSystemExport|

            |absolutePath|

            |stageData|
