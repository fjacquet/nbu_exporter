                                      example: 1
                                    numDomainFailuresTolerated:
                                      type: integer
                                      description: >-
                                        Number of domain failures that can be
                                        tolerated.
                                      example: 1
                                defaultReplicationFactor:
                                  type: integer
                                  description: >-
                                    Default replication factor for this fault
                                    tolerance option.
                                  example: 2
                                erasureCodingOptions:
                                  type: array
                                  description: >-
                                    List of erasure coding options available for
                                    this fault tolerance level.
                                  items: &ref_432
                                    type: object
                                    description: An erasure coding option configuration.
                                    properties:
                                      erasureCoding: &ref_123
                                        type: object
                                        description: >-
                                          Erasure coding configuration defining
                                          data and parity stripe counts.
                                        properties:
                                          numDataStripes:
                                            type: integer
                                            description: Number of data stripes.
                                            example: 2
                                          numCodedStripes:
                                            type: integer
                                            description: Number of coded (parity) stripes.
                                            example: 1
                                      usableStoragePercent:
                                        type: integer
                                        description: >-
                                          Percentage of usable storage with this
                                          erasure coding configuration.
                                        example: 67
                                      inlineSupported:
                                        type: boolean
                                        description: >-
                                          Whether inline erasure coding is
                                          supported.
                                        example: true
                                      isSuboptimal:
                                        type: boolean
                                        description: >-
                                          Whether this erasure coding option is
