    post:
      description: >
        Creates a storage server in NetBackup with specified attributes.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-SERVERS|`\

        Requires Operation: `|OPERATIONS|ADD|`
      tags:
        - Storage Servers
      requestBody:
        content:
          application/vnd.netbackup+json;version=14.0:
            schema: &ref_255
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      description: The type of entity to create.
                      enum:
                        - storageServer
                    id:
                      type: string
                      description: >-
                        The unique identifier associated with the storage
                        server.
                    attributes:
                      type: object
                      properties:
                        name:
                          type: string
                          description: The name of the storage server to be created.
                        storageCategory:
                          type: string
                          description: The storage category of the storage server.
                          enum:
                            - ADVANCED_DISK
                            - CLOUD
                            - CLOUD_CATALYST
                            - DIRECTIO
                            - MSDP
                            - OPEN_STORAGE
                        mediaServerDetails: *ref_23
                        additionalMediaServersDetails: &ref_50
                          type: array
                          description: Details of the additional media servers to be added.
                          items: *ref_23
                        mvgenabled:
                          type: boolean
                          default: false
                          description: 'If set to `true`, the MSDP volume group is enabled.'
                        encryptionEnabled:
                          type: boolean
                          default: false
                          description: 'If set to `true`, encryption is enabled.'
                        kmsEnabled:
                          type: boolean
                          default: false
                          description: >
                            If this attribute is set to `true`, Key Management
                            Service (KMS) is enabled. This attribute can be
                            provided only if the `encryptionEnabled` setting is
                            set to true.
                        kmsKeyGroupName:
                          type: string
                          description: >
                            The Key Management Service (KMS) key group name to
                            be set for MSDP storage server. This attribute is
                            mandatory if the `kmsEnabled` setting is set to true
                            and needs to be encrypted using KMS.
                        msdpAttributes: &ref_222
                          type: object
                          description: The MSDP storage server configuration details.
                          properties:
                            storagePath:
                              type: string
                              description: The MSDP storage path.
