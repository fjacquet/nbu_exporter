                        type: string
                        description: The name of the storage lifecycle policy (SLP).
                      versionNumber:
                        type: integer
                        description: >
                          The version number of this storage lifecycle policy
                          (SLP) for which data is being returned. This parameter
                          is ignored if passed in the request to create a
                          storage lifecycle policy (SLP).
                      flagValues:
                        type: array
                        description: >
                          'The list of storage lifecycle policy (SLP)-specific
                          flag values. Supported input/output flag values:
                          inactive: If this flag is specified, the storage
                          lifecycle policy (SLP) is inactive. Supported output
                          flag values: snaponly: This flag indicates that the
                          storage lifecycle policy (SLP) contains only a
                          "Snapshot" operation. snapdupe: This flag indicates
                          that the storage lifecycle policy (SLP) contains a 
                          "Snapshot" operation and a "Backup From Snapshot"
                          operation. snapreplicate: This flag indicates that the
                          storage lifecycle policy (SLP) contains a  "Snapshot"
                          operation and a "Replication" operation. snapindex:
                          This flag indicates that the storage lifecycle policy
                          (SLP) contains a  "Snapshot" operation and an "Index
                          From Snapshot" operation.'
                        items:
                          type: string
                      active:
                        type: boolean
                        description: >
                          Indicates the state of secondary operation proccesing
                          specific to storage lifecycle policy (SLP).
                      activationTime:
                        type: string
                        format: date-time
                        description: >
                          Indicates the time at which the storage lifecycle
                          policy (SLP) is activated, in UTC. This parameter is
                          applicable only for an inactive storage lifecycle
                          policy (SLP).
                      dataClassification:
                        type: string
                        description: >
                          'Defines the level or classification of data that the
                          storage lifecycle policy (SLP) is allowed to process.
                          The name of the data classification this image is
                          compatible with.  "Any" indicates it is able to import
                          and manage any image regardless of data
                          classification.  "None" indicates no data
                          classification.'
                      duplicationPriority:
                        type: integer
                        description: >
                          The priority of duplication jobs initiated by this
                          storage lifecycle policy (SLP). Valid range is 0 to
                          99999.
                      operationList:
                        type: array
                        description: >
                          The list of operations that the storage lifecycle
                          policy (SLP) will  perform on the backup copies.
                        items: &ref_393
                          type: object
                          properties:
                            flagValues:
                              type: array
                              description: >
                                The list of operation-specific flag values.
                                Supported input/output flag values: inactive: If
                                this flag is specified, the operation is
                                inactive. deferred_op: If this flag is specified
                                for duplication operation,  the operation is
                                deferred until the source copy is about to
                                expire. Supported output flag values:
                                AIR_enabled: This flag indicates that the
                                operation is an "Auto Image Replication (AIR)"
                                operation. snapdupe: This flag indicates that
                                the operation is a "Backup From Snapshot"
                                operation. snapreplicate: This flag indicates
                                that the operation is a "Replication" operation
                                with a "Snapshot" operation as source.
                                snapindex: This flag indicates that the
                                operation is an "Index From Snapshot" operation.
                              items:
                                type: string
                            alternateReadServer:
                              type: string
                              description: >-
                                The host name to use for reading in a
                                duplication job.
                            operationActivationTime:
                              type: string
                              format: date-time
                              description: >
                                The UTC timestamp at which the operation is
                                activated. This parameter is applicable only for
                                a "suspended" operation.
                            operationIndex:
                              type: integer
                              description: >
                                Indicates the execution order of the operations
                                in the storage lifecycle policy (SLP),  starting
                                from index 1. This parameter is ignored if
                                passed in the request to create a storage
                                lifecycle policy (SLP).
                            preserveMultiplexing:
                              type: boolean
                              description: >
                                Sets the preserve multiplexing flag for
                                duplication copies. The flag is relevant only
                                for tape copies.
                            operationType:
                              type: string
                              description: >
                                The operation that is performed for this step in
                                the storage lifecycle policy.
                              enum:
                                - BACKUP
                                - SNAPSHOT
                                - IMPORT
                                - BACKUP_FROM_SNAPSHOT
                                - INDEX_FROM_SNAPSHOT
                                - DUPLICATION
                                - REPLICATION
                                - REPLICATE_TO_REMOTE_MASTER
                                - CLOUD_SNAPSHOT_REPLICATION
                                - CLOUD_SNAPSHOT_INDEX
                            retentionPeriod:
                              type: object
                              description: The retention period for the image copy.
                              properties:
                                value:
                                  type: integer
                                  description: >
                                    The value for the retention period for the
                                    image copy. Valid values are -1 and above. A
                                    value of -1 indicates a retention period of
                                    infinity. A value of 0 immediately expires
                                    the image copy, regardless of the unit that
                                    is specified.
                                unit:
                                  type: string
                                  description: >
                                    The unit of retention period in terms of
                                    time. For example, WEEKS, MONTHS etc. Note
                                    that INFINITE applies a retention period of
                                    infinity to the image copy, regardless of
                                    the value that is specified.
                                  enum:
                                    - SECONDS
                                    - MINUTES
                                    - HOURS
                                    - DAYS
                                    - WEEKS
                                    - MONTHS
                                    - YEARS
                                    - INFINITE
                            retentionType:
                              type: string
                              description: >-
                                Indicates how to manage the retention of this
                                copy.
                              enum:
                                - FIXED
                                - EXPIRE_AFTER_COPY
                                - MAXIMUM_SNAPSHOT_LIMIT
                                - MIRROR
                                - TARGET_RETENTION
                                - CAPACITY_MANAGED
                            serverGroup:
                              type: string
                              description: >-
                                The name of the media sharing group that shares
                                the tape media.
                            sourceOperationIndex:
                              type: integer
                              description: >
                                Specifies the source copy of the image to
                                duplicate or replicate.
                            targetImportSLP:
                              type: string
                              description: >
                                The name of the storage lifecycle policy (SLP)
                                created for the import operation  to the target
                                master server.
                            targetMasterServer:
                              type: string
                              description: >-
                                The name of the target master server to
                                replicate the image to.
                            slpWindowName:
                              type: string
                              description: >
                                The name of the window that defines when the
                                storage lifecycle policy operation can run.
                            operationPriority:
                              type: integer
                              description: >
                                Specifies the job priority for each storage
                                lifecycle policy (SLP) operation index. Valid
                                range is 0 to 99999. "-1" indicates that the
                                default duplication priority is effective.
                            slpWindowClose:
                              type: string
                              description: >
                                The action to take if the image processing is
                                not complete or if the images cannot be
                                suspended by the time the storage lifecycle
                                policy (SLP) window closes. This parameter is
                                not applicable for the "Backup" and "Snapshot"
                                operations.
                              enum:
                                - CANCEL
                                - FINISH
                            storage:
                              type: object
                              properties:
                                name:
                                  type: string
                                  description: >
                                    The name of the storage unit or storage unit
                                    group to use for this operation. There are
                                    two special cases to be aware of: When
                                    operationType is REPLICATE_TO_REMOTE_MASTER
                                    the value of this field must be null. When
                                    operationType is CLOUD_SNAPSHOT_REPLICATION
                                    the value of this field must be the
                                    providerGenerated ID for the region asset
                                    where the snapshot will be replicated. This
                                    ID can found using the asset APIs. When
                                    operationType is CLOUD_SNAPSHOT_INDEX the
                                    value of this field must be null.
                                stype:
                                  type: string
                                  description: >
                                    The type of the storage unit or storage unit
                                    group to use for this operation. For
                                    operationType REPLICATE_TO_REMOTE_MASTER in
                                    GET storage lifecycle policy (SLP)
                                    operation,  this parameter has the value
                                    "null" in response.
                                dpCapabilities:
                                  type: array
                                  description: >
                                    The disk pool capabilities of the storage
                                    unit or storage unit group to use for this
                                    operation. For operationType
                                    REPLICATE_TO_REMOTE_MASTER in GET storage
                                    lifecycle policy (SLP) operation,  this
                                    parameter has the value "null" in response.
                                  items:
                                    type: string
                                ssCapabilities:
                                  type: array
                                  description: >
                                    The storage server capabilities of the
                                    storage unit or storage unit group to use
                                    for this operation. For operationType
                                    REPLICATE_TO_REMOTE_MASTER in GET storage
                                    lifecycle policy (SLP) operation,  this
                                    parameter has the value "null" in response.
                                  items:
                                    type: string
                            volumePool:
                              type: string
                              description: >
                                The name of the volume pool to use for this
                                operation
                          required:
                            - operationType
                            - retentionPeriod
                            - sourceOperationIndex
                            - storage
