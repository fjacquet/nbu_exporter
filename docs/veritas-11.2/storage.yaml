  '/storage/bulk-vault-robots-requests/{requestId}':
    parameters:
      - name: requestId
        in: path
        required: true
        description: >-
          The request ID generated in the location header of delete
          bulk-vault-robots-requests api.
        schema:
          type: string
    get:
      description: >
        Retrieves the status of a bulk vault robot request specified by
        `requestId`.


        If the bulk request has completed (200 or 207 response status codes),
        regardless of

        the outcome of the individual vault robot records, after this call, that
        request and all of its records

        will immediately be deleted and can no longer be retrieved.

         **Access Control**\
         Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
         Namespace: `|STORAGE|TAPE-MEDIA|VAULT|`\
         Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Vault Management
      responses:
        '200':
          description: >-
            Successfully deleted the specified vault robots. There were no
            errors found.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_10
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 1
                      type: vaultRobot
                    - httpStatus: 204
                      id: 2
                      type: vaultRobot
        '202':
          description: Bulk request is in progress.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_10
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 202
                      id: 1
                      type: vaultRobot
                    - httpStatus: 202
                      id: 2
                      type: vaultRobot
        '207':
          description: >
            The bulk request has completed, but one or more vault robots in the
            bulk request could not be deleted.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_93
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 404
                      id: 1
                      type: vaultRobot
                      errors:
                        errorCode: 1
                        errorMessage: entity not found
                    - httpStatus: 204
                      id: 2
                      type: vaultRobot
        '401': *ref_2
        '404': *ref_3
        '406': *ref_5
        '500': *ref_4
    delete:
      description: >
        Cancels an ongoing vault robot request, specified by `requestId`, and
        retrieves its status.


        Regardless of the outcome of the individual vault robot records, after
        this call, that request

        and all of its records will immediately be deleted and can no longer be
        retrieved.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|TAPE-MEDIA|VAULT|`\

        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Vault Management
      responses:
        '207':
          description: Successfully cancelled the bulk request.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_10
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 4
                      type: vaultRobot
                    - httpStatus: 422
                      id: 5
                      type: vaultRobot
        '401': *ref_2
        '404': *ref_3
        '406': *ref_5
        '409':
          description: The bulk request has already completed.
