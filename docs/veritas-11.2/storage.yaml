  /storage/bulk-tape-media-requests:
    patch:
      description: >
        Asynchronously updates one or more tape volumes.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|TAPE-MEDIA|`\

        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Tape Media
      requestBody:
        content:
          application/vnd.netbackup+json;version=14.0:
            schema: &ref_336
              type: object
              required:
                - data
              properties:
                data:
                  type: array
                  minItems: 1
                  maxItems: 1024
                  items: &ref_337
                    type: object
                    required:
                      - id
                      - type
                      - attributes
                    properties:
                      id:
                        type: string
                        example: AAAA00
                      type:
                        type: string
                        enum:
                          - updateVolumeInfosRequest
                      attributes: &ref_338
                        type: object
                        properties:
                          description:
                            type: string
                            description: Specifies the media description for the volumes.
                            maxLength: 25
                            example: test description for volume
                          volumePool:
                            type: string
                            description: >-
                              The name of the volume pool that is associated
                              with the copy.
                            example: myVolumePool
                          maxMounts:
                            type: integer
                            description: >
                              Specifies maximum number of mounts that are
                              allowed for the volumes. Zero is the same as
                              unlimited.<br>

                              Note: This attribute is only used for volumes of
                              non-cleaning media type.
                            minimum: 0
                          volumeExpiration:
                            type: string
                            format: date-time
                            description: >
                              The ISO 8601 timestamp that indicates the
                              expiration date of the volume. Empty string ("")
                              indicates the volume is set to never expire.
                          cleaningsRemaining:
                            type: integer
                            description: >
                              Specifies as to how many times more the cleaning
                              media can be used. Zero is the same as
                              unlimited.<br>

                              Note: This attribute is only used for volumes of
                              cleaning media type.
                            minimum: 0
                          mediaOwner:
                            type: string
                            description: >-
                              Specifies the media server or group that owns the
                              media.
                            example: mediaserver.com
                          volumeGroup:
                            type: string
                            description: Volume group that volume belongs to.
                            example: myVolumeGroup
                            maxLength: 25
                            pattern: '^[A-Za-z0-9_+\-\.\\]*$'
                          statusChange:
                            type: string
                            description: Update media status.
                            enum:
                              - FREEZE
                              - UNFREEZE
                              - SUSPEND
                              - UNSUSPEND
                            example: SUSPEND
        description: Tape volume configuration details.
        required: true
      responses:
        '202':
          description: Bulk request accepted.
          headers:
            Location:
              description: >
                A link to the status monitor of the request.


                After the request is submitted, the maximum period that the
                status monitor will be retrievable

                is 24 hours. Canceling the request or restarting the Web server
                will immediately

                make the status monitor invalid.
              schema:
                type: string
                format: url
        '400': *ref_7
        '401': *ref_2
        '406': *ref_5
        '413':
          description: >-
            The request to update volumes contains too many items (>1024). Break
            up the request into multiple batches and resubmit.
        '415': *ref_8
        '429':
          description: >-
            Too many volume-update requests are already running (>32). Wait for
            one to complete before resubmitting.
        '500': *ref_4
    delete:
      description: |
