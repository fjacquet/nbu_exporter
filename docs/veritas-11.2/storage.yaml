                            - &ref_214
                              type: object
                              required:
                                - maxConcurrentDrives
                              properties:
                                maxConcurrentDrives:
                                  description: >-
                                    The maximum number of concurrent drives.
                                    This is only valid for tape storage units.
                                  type: integer
                                  default: 1
                                  maximum: 256
                                  minimum: 0
                                storageDeviceValid:
                                  description: >-
                                    Indicates if the storage device is valid and
