    get:
      description: >
        Fetch the list of the barcode rules.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|TAPE-MEDIA|`\

        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      parameters:
        - name: filter
          description: >
            Filter criteria syntax is based on OData standards. Filtering is
            supported on the following attributes:

            |Name|Supported Operators|Description|Schema|

            |---|---|---|---|

            |tag|eq ne and or not () contains endswith startswith tolower
            toupper|The barcode tag.|string|

            |mediaType|eq ne and or not () contains endswith startswith tolower
            toupper|The media type.|string|

            |volumePool|eq ne and or not () contains endswith startswith tolower
            toupper|The volume pool name.|string|

            |description|eq ne and or not () contains endswith startswith
            tolower toupper|The barcode rule description.|string|
          in: query
          required: false
          schema:
            type: string
        - name: sort
          description: >
            Sort the response data in ascending or descending order on the
            specified attribute. Prefix with `-` for descending order.

            The value of this parameter must be a comma-separated list of sort
            fields in the order they are to be sorted.

            Sorting is supported on the following attributes:

            |Name|

            |---|

            |id|

            |mediaType|

            |volumePool|

            |description|

            |maxMounts|
          in: query
          required: false
          schema:
            type: string
        - *ref_96
        - *ref_83
      responses:
        '200':
          description: >-
            Successfully retrieved the barcode rules from the media manager
            server.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: &ref_408
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items: &ref_114
                      type: object
                      required:
                        - id
                        - type
                        - attributes
                      properties:
                        id:
                          type: string
                          description: >
                            The barcode tag. A barcode tag can use the following
                            characters: A-Z, 0-9, and _ (underscore). The
                            underscore cannot be the first character of the
                            barcode tag.
                          maxLength: 16
                        type:
                          type: string
                          enum:
                            - barcodeRules
                        attributes:
