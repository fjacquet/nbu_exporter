                        -----END CERTIFICATE-----
                      schemaType: rfc2307
                      adminUserDN: adminUserDN
                      adminUserPassword: adminUserPassword
                      userBaseDN: userBaseDN
                      groupBaseDN: groupBaseDN
                      authenticationType: BOB
                      searchScope: SUB
        description: >-
