                                description: The issuer's principal domain for an API key.
                              principalDomainType:
                                type: string
                                description: >-
                                  The issuer's principal domain type for an API
                                  key.
        '400': *ref_5
        '401': *ref_2
        '409':
          description: The API key is already issued.
          content:
            application/vnd.netbackup+json;version=10.0:
