  /security/anomaly-configurations:
    get:
      description: >
        Retrieves the anomaly detection configuration.

        **Access Control**\ Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|MANAGE|ANOMALIES|`\ Requires Operation:
        `|OPERATIONS|VIEW|`     
      tags:
        - Anomaly
      responses:
        '200':
          description: Successfully retrieved anomaly detection configuration.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_70
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - anomalyConfig
                        id:
                          type: string
                        attributes: &ref_69
                          type: object
                          properties:
                            anomalyProxyServer:
                              type: string
                              description: >
                                The server where anomaly detection algorithm
                                runs.

                                Default value is the current Primary server
                                name.
                            sensitivity:
                              type: integer
                              default: 0
                              description: >
                                Provides the sensitivity of anomaly detection in
                                percentage.

                                A positive percentage reduces the number of
                                anomaly alerts (cluster size will increase)

                                A negative percentage increases the number of
                                anomaly alerts (cluster size will decrease) 
                            purgeDataIntervalInMonths:
                              type: integer
                              default: 12
                              maximum: 12
                              description: >
                                Cleans up the database after the specified
                                number of months.
                            liveDataGatherFrequencyInMins:
                              type: integer
                              default: 15
                              description: |
                                Specifies the frequency of data gathering.
                            disableAnomalyDetection:
                              type: integer
                              default: 0
                              description: >
                                Disables all anomaly detection services. 

                                Provide 1 to turn off all services (detection,
                                alert, data gathering)

                                Provide 0 to allow one or more anomaly detection
                                services to run

                                If 1 is selected, the “turn off only detection”
                                and “disable alert service” will be ignored 
                            disableDetectionService:
                              type: integer
                              default: 1
                              description: |
                                Disables the detection service
                                Provide 0 to start the detection service
                                Provide 1 to stop the detection service
                            disableAlertService:
                              type: integer
                              default: 1
                              description: |
                                Disables alert service
                                Provide 0 to start the alert service
                                Provide 1 to stop the alert service
                            excludeClients:
