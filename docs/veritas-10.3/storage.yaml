            |enableBlockSharing|eq ne|Indicates if block sharing is
            enabled.|boolean|

            |transferThrottle|eq ne gt ge lt le or not|The maximum data transfer
            bandwidth for SnapVault. A setting of 0 is unlimited
            bandwidth.|integer|

            |fileSystemExport|eq ne|Indicates if file system export is
            enabled.|boolean|
          in: query
          required: false
          schema:
            type: string
