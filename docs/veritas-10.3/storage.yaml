                    default: NONE
                  mediaStatus: &ref_244
                    type: string
                    enum:
                      - FROZEN
                      - SUSPENDED
                      - FULL
                      - MULTIPLE_RETENTION_LEVELS
                      - IMPORTED
                      - ACTIVE
                      - MULTIPLEXED
                      - WORM
                      - BE
                    description: |
                      Status of media type.
                  mediaOwner:
                    type: string
                    description: Specifies the media server or group that owns the media.
                    default: NONE
                  serverGroup:
                    type: string
                    description: Specifies the server group
                  lastWriteHost:
                    type: string
                    description: Specifies the last host that was written onto.
                    default: NONE
              links:
                type: object
                properties:
                  self:
                    type: object
                    properties:
                      href:
