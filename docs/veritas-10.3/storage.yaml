          type: boolean
          description: >
            This flag indicates that alias is associated with a MSDP cloud
            volume configuration.
          readOnly: true
        isSourceKind:
          type: boolean
          description: >
            This flag indicates that alias is associated with a cloud object
            store account.
          readOnly: true
        isStorageServer:
          type: boolean
          description: |
