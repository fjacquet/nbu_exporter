                    enum:
                      - HCART
                      - HC_CLN
                      - DLT
                      - DLT_CLN
                      - HCART2
                      - HC2_CLN
                      - DLT2
                      - DLT2_CLN
                      - HCART3
                      - HC3_CLN
                      - DLT3
                      - DLT3_CLN
                    example: HCART
                  robot:
                    type: object
                    description: Specifies robot for this volume group.
                    properties:
                      robotType:
                        type: string
                        description: Type of the robot
                        enum:
                          - NA
                          - NOT_ROBOTIC
                          - ACS
                          - TLD
                      robotNumber:
                        type: integer
                        description: Specifies ID of the library where the media resides.
                      robotControlHost:
