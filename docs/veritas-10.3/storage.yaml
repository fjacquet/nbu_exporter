                              type: string
                              description: The category of the storage unit.
                              enum:
                                - ADVANCED_DISK
                                - BASIC_DISK
                                - CLOUD
                                - CLOUD_CATALYST
                                - MSDP
                                - OPEN_STORAGE
                                - TAPE
                            absolutePath:
                              type: string
                              description: >
                                The pathname to directory or volume available
                                for any storage unit that is not based on disk
                                pools.

                                This field is applicable only for basic disk.
                            okOnRoot:
                              type: boolean
                              description: >
                                If this option is set to `true`, this directory
                                can exist on a root file system or system disk.

                                This field is applicable only for basic disk.
                            stageData:
                              type: boolean
                              description: >
                                If this option is set to `true`, the temporary
                                staging area is enabled.

                                This field is applicable only for basic disk.
                            useAnyAvailableMediaServer:
                              description: >-
                                If set to `true`, any available media server is
                                used.
                              type: boolean
                              default: true
                            accelerator:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit supports
                                NetBackup Accelerator.
                            replicationCapable:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit supports
                                replication. The storage unit can be used as a
                                source, target, or both.
                            replicationSourceCapable:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit can be used
                                as a source for replicating backup images.
                            replicationTargetCapable:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit can be used
                                as a source for replicating backup images.
                            snapshot:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit can be used
                                to hold snapshots.
                            mirror:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit can use a
                                mirrored replication method.
                            independent:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit can use a
                                non-mirrored replication method.
                            primary:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit is capable of
                                Snapshots from sources mounted on a client.
                            instantAccessEnabled:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit supports
                                instant access.
                            scaleOutEnabled:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit supports
                                scale-out storage.
                            isCloudSTU:
                              type: boolean
                              description: >-
                                If set to `true`, the storage unit is a cloud
                                storage unit.
                            freeCapacityBytes:
                              type: integer
                              format: int64
                              description: >
                                The space that is available for the storage
                                unit, in bytes.

                                This field is not applicable for Cloud and
                                CloudCatalyst.
                            totalCapacityBytes:
                              type: integer
                              format: int64
                              description: >
                                The total capacity of the storage unit, in
                                bytes.

                                This field is not applicable for Cloud and
                                CloudCatalyst.
                            usedCapacityBytes:
                              type: integer
                              format: int64
                              description: >
                                The space in the storage unit that is used, in
                                bytes.

                                This field is not applicable for Cloud and
                                CloudCatalyst.
                            mediaServerDetails:
                              type: array
                              description: >-
                                The list of media servers associated with the
                                storage server.
                              items: &ref_24
                                type: object
                                description: Details of the media server.
                                properties:
                                  name:
                                    type: string
                                    description: Name of the media server.
                                  operatingSystem:
                                    type: string
                                    description: Operating system of the media server.
                                  netbackupVersion:
                                    type: string
                                    description: NetBackup version of the media server.
                                required:
                                  - name
                                  - operatingSystem
                                  - netbackupVersion
                            maxFragmentSizeMegabytes:
                              description: >
                                The maximum fragment size in MB. The default and
                                maximum value for MSDP storage is 51200 MB. The
                                default and maximum value for other storage type
                                is 524288 MB.
                              type: integer
                              minimum: 20
                            onDemandOnly:
                              description: >-
                                If set to `true`, the storage unit is available
                                on-demand.
                              type: boolean
                              default: false
                            wormCapable:
                              type: boolean
                              description: >
                                If set to `true`, the WORM (write once read
                                many) feature is available for use for the
