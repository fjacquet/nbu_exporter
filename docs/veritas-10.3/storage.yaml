  /storage/storage-servers:
    get:
      description: >
        Returns the list of attributes for all the storage servers.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-SERVERS|`\

        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Storage Servers
      parameters:
        - name: filter
          description: >
            Filter criteria syntax is based on OData standards. Filtering is
            supported on the following attributes:

            |Name|Supported Operators|Description|Schema|

            |---|---|---|---|

            |name|eq ne gt ge lt le and or not () contains endswith startswith
            tolower toupper|The storage server name.|string|

            |sType|eq ne gt ge lt le and or not () contains endswith startswith
            tolower toupper|The server type. For example, PureDisk,
            AdvancedDisk.|string|

            |storageCategory|eq contains tolower toupper|The server category.
            For example, MSDP, CLOUD.|string|

            |isWormSupported|eq|WORM (write once read many) is configured on the
            storage server.|boolean|

            |isUshareSupported|eq|Universal share is configured on the storage
            server.|boolean|
          in: query
          required: false
          schema:
            type: string
        - name: 'page[limit]'
          description: The number of storage server records on one page.
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: 'page[offset]'
          description: The offset of storage server records.
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: 'fieldset[storageServer]'
          description: >
            A sparse field set view for a storage server.

            |Name|Description|

            |---|---|

            |minimal|A sparse field set view restricted to the following fields:
            name, storageCategory, sType, additionalMediaServersDetails,
            storageServerState, storageServerCapabilities, isSnapshotSupported,
            isAcceleratorSupported, isAIRSupported, storageUnits,
            extendedCapabilities.
          in: query
          required: false
          schema:
            type: string
        - name: sort
          description: >
            Sort the response data in ascending or descending order on the
            specified attribute. Prefix with `-` for descending order.

            The value of this parameter must be a comma-separated list of sort
            fields in the order they are to be sorted.

            Sorting is supported on the following attributes:

            |Name|

            |---|

            |name|

            |sType|

            |storageCategory|

            |storageServerState|

            |encryptionEnabled|

            |isSnapshotSupported|

            |isAcceleratorSupported|

            |isAIRSupported|

            |isWormSupported|
