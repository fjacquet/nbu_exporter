                              default: 0
                              minimum: 0
                              maximum: 9999999
                            fileSystemExport:
                              type: boolean
                              description: Indicates if file system export is enabled.
                            diskStagingSchedule: &ref_141
                              type: object
                              description: The attributes of the storage unit.
                              properties:
                                scheduleName:
                                  type: string
                                  description: The name of the schedule.
                                scheduleType:
                                  type: string
                                  description: The type of the schedule.
                                  enum:
                                    - CALENDAR
                                    - FREQUENCY
