openapi: 3.0.0
info:
  version: '9.0'
  title: NetBackup Storage API
  description: >
    The NetBackup Storage API provides access to the storage of the NetBackup
    master server.
externalDocs:
  description: Getting Started Guide
  url: >-
    http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started/
servers:
  - url: 'https://<masterserver>:1556/netbackup'
    description: NetBackup Master
paths:
  /storage/backup-sizes:
    get:
      description: >
        Returns the total backup size information based on the specified
        filters.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|MANAGE|LICENSING|STORAGE|`\

        Requires Operation: `|OPERATIONS|VIEW|
      tags:
        - Backup Sizes
      parameters:
        - name: filter
          description: >
            Filter criteria syntax is based on OData standards. Filtering is
            supported on the following attributes:

            |Name|Supported Operators|Description|Schema|

            |---|---|---|---|

            |clientName|eq|The client name.|string|

            |masterServerName|eq|The master server name.|string|
          in: query
          required: false
          schema:
            type: string
        - name: 'page[limit]'
          description: The number of backup size records on one page.
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 100
            default: 10
        - name: 'page[offset]'
          description: The backup size record number offset.
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successfully returned the total backup size information.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_105
                type: object
                properties:
                  data:
                    type: array
                    items: &ref_106
                      type: object
                      properties:
                        type:
                          type: string
                          enum:
                            - BackupSize
                        attributes: &ref_107
                          type: object
                          properties:
                            masterServerName:
                              type: string
                            createDateTime:
                              type: string
                              format: date-time
                            clientBackupSizeDetails:
                              type: array
                              items: &ref_108
                                type: object
                                properties:
                                  clientName:
                                    type: string
                                    description: The name of the client.
                                  policyName:
                                    type: string
                                    description: The name of the policy.
                                  policyType:
                                    type: string
                                    description: The type of the policy.
                                  storageUnitName:
                                    type: string
                                    description: The name of the storage unit.
                                  storageType:
                                    type: string
                                    description: The type of the storage unit.
                                  totalBackupSizeMB:
                                    type: number
                                    format: double
                                    description: The total backup size in MB.
                                required:
                                  - clientName
                                  - policyName
                                  - policyType
                                  - storageUnitName
                                  - storageType
                                  - totalBackupSizeMB
                          required:
                            - masterServerName
                            - createDateTime
                            - clientBackupSizeDetails
                      required:
                        - type
                        - attributes
                  meta:
                    type: object
                    properties:
                      pagination: &ref_8
                        type: object
                        properties:
                          count:
                            type: integer
                            description: Total number of records.
                          pages:
                            type: integer
                            description: Total number of pages.
                          page:
                            type: integer
                            description: The current page number.
                          offset:
                            type: integer
                            description: The offset value for the current page.
                          limit:
                            type: integer
                            description: The number of records per page.
                          first:
                            type: integer
                            description: The offset value for the first page.
                          last:
                            type: integer
                            description: The offset value for the last page.
                          next:
                            type: integer
                            description: The offset value for the next page.
                          prev:
                            type: integer
                            description: The offset value for the previous page.
                required:
                  - data
                  - meta
        '401': &ref_2
          description: >
            The `Authorization` header is missing, the token is invalid, or you
            do not have permission for this action.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_0
                type: object
                properties:
                  errorCode:
                    type: integer
                    format: int64
                    description: The NetBackup error code.
                  errorMessage:
                    type: string
                    description: The NetBackup error code description.
                  attributeErrors:
                    type: object
                    description: >
                      Maps the attributes with the invalid values to an error
                      that describes why the value is invalid, to provide more
                      context to the nature of the error.
                  errorDetails:
                    type: array
                    description: >-
                      A list that contains additional information about the
                      error.
                    items:
                      type: string
                  fileUploadErrors:
                    type: array
                    description: >
                      If an API is supporting content-type multipart/form-data,
                      then this holds a list of objects that contains names of
                      failed files and associated error messages.
                    items:
                      type: object
                required:
                  - errorCode
                  - errorMessage
        '404':
          description: The client name was not found.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: *ref_0
  '/storage/cloud/providers/{providerId}/swift-regions':
    post:
      description: >
        Returns the list of the OpenStack Swift regions with their storage URL.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|CLOUD|SWIFT-REGIONS|`\

        Requires Operation: `|OPERATIONS|VIEW|
      tags:
        - Cloud Providers
      parameters:
        - &ref_5
          name: providerId
          in: path
          description: The unique identifier for the cloud storage provider.
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/vnd.netbackup+json;version=10.0:
            schema: &ref_170
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      description: The type of entity to fetch.
                      enum:
                        - swiftRegionRequest
                    attributes: &ref_171
                      type: object
                      properties:
                        authType:
                          type: string
                          description: >-
                            The authentication type for the cloud storage
                            provider.
                          enum:
                            - IDENTITY_V2
                            - IDENTITY_V3
                        proxyServerEnabled:
                          type: boolean
                          default: false
                          description: >
                            If set to `true`, the proxy server is enabled.
                            Provide proxy server details if this flag is set to
                            `true`.
                        proxyServerDetails: &ref_22
                          type: object
                          description: The proxy server details for cloud.
                          properties:
                            proxyHost:
                              type: string
                              description: The IP address or name of the proxy server.
                            proxyPort:
                              type: integer
                              description: The port number of the proxy server.
                            proxyType:
                              type: string
                              default: HTTP
                              description: >-
                                The proxy type details. Provide the proxy
                                credential for HTTP proxy type.
                              enum:
                                - HTTP
                                - SOCKS
                                - SOCKS4
                                - SOCKS5
                                - SOCKS4A
                            proxyCredentials: &ref_163
                              type: object
                              description: >-
                                The proxy server credentials, required in case
                                of HTTP proxy type only.
                              properties:
                                useProxyTunneling:
                                  type: boolean
                                  default: false
                                  description: >-
                                    Enables to send HTTP CONNECT request from
                                    cloud media server to HTTP proxy server.
                                authType:
                                  type: string
                                  default: NONE
                                  description: >
                                    The authentication type for the HTTP proxy
                                    type. Provide user name and password for the
                                    NTLM and BASIC authentication type.
                                  enum:
                                    - NONE
                                    - NTLM
                                    - BASIC
                                userName:
                                  type: string
                                  description: User name of the proxy server.
                                password:
                                  type: string
                                  description: >
                                    The password of the proxy server. The
                                    password should not exceed 256 characters.
                          required:
                            - proxyHost
                            - proxyPort
                            - proxyType
                        v2Identity: &ref_30
                          type: object
                          description: >-
                            For Swift cloud storage server, if authentication
                            type is `IDENTITY_V2`, provide credentials of V2
                            version.
                          required:
                            - authenticationDetails
                            - tenantDetails
                            - userCredentialsDetails
                          properties:
                            authenticationDetails: &ref_1
                              type: object
                              description: >-
                                The authentication details for the credentials
                                configuration of the cloud storage server.
                              properties:
                                authenticationLocationId:
                                  type: string
                                  description: >
                                    The authentication location identifier of
                                    the cloud storage. This parameter is
                                    optional. Specify this field if you want to
                                    use predefined public authentication service
                                    URLs. Obtain this value with the
                                    `storage/cloud/providers` API.
                                authenticationUrl:
                                  type: string
                                  description: >
                                    The valid authentication URL provided by the
                                    cloud vendor. This is an optional field only
                                    if the URL is available in NetBackup
                                    database.
                            tenantDetails: &ref_165
                              type: object
                              description: The tenant details required for V2 version.
                              properties:
                                tenantId:
                                  type: string
                                  description: >
                                    The user tenant ID that is associated with
                                    cloud storage credentials. The tenant ID not
                                    required if tenant name is provided.
                                tenantName:
                                  type: string
                                  description: >
                                    The user tenant name that is associated with
                                    cloud storage credentials. The tenant name
                                    not required if tenant ID is provided.
                            userCredentialsDetails: &ref_32
                              type: object
                              description: >-
                                The user credentials that are required to access
                                the cloud storage.
                              required:
                                - userName
                                - password
                              properties:
                                userName:
                                  type: string
                                  description: The user name to access the cloud storage.
                                password:
                                  type: string
                                  description: The password to access the cloud storage.
                        v3Identity: &ref_31
                          type: object
                          description: >-
                            For Swift cloud storage server, if authentication
                            type is IDENTITY_V3, provide credentials of V3
                            version.
                          required:
                            - authenticationDetails
                            - userDetails
                            - projectDetails
                          properties:
                            authenticationDetails: *ref_1
                            userDetails: &ref_166
                              type: object
                              description: The user details for cloud storage.
                              required:
                                - password
                              properties:
                                userId:
                                  type: string
                                  description: >
                                    The user ID associated with cloud storage
                                    credentials. User name and domain
                                    information is not required if the user ID
                                    is specified.
                                userName:
                                  type: string
                                  description: The user name to access the cloud storage.
                                password:
                                  type: string
                                  description: >-
                                    The password to access the cloud storage.
                                    Password must not exceed 100 characters.
                                domainId:
                                  type: string
                                  description: >
                                    The domain ID of the user that is associated
                                    with cloud storage credentials. The domain
                                    ID is not required if the domain name is
                                    specified.
                                domainName:
                                  type: string
                                  description: >
                                    The domain name of the user that is
                                    associated with cloud storage credentials.
                                    The domain name is not required if the
                                    domain ID is specified.
                            projectDetails: &ref_167
                              type: object
                              description: The project details for the cloud storage.
                              properties:
                                projectId:
                                  type: string
                                  description: >
                                    The project ID associated with cloud storage
                                    credentials. The project name and domain
                                    information is not required if project ID
                                    provided.
                                projectName:
                                  type: string
                                  description: >-
                                    The project name associated with cloud
                                    storage credentials.
                                domainId:
                                  type: string
                                  description: >
                                    The project domain ID associated with cloud
                                    storage credentials. The domain ID is not
                                    required if the domain name is specified.
                                domainName:
                                  type: string
                                  description: >
                                    The project domain name associated with
                                    cloud storage credentials. The domain name
                                    is not required if the domain ID is
                                    specified.
                      required:
                        - authType
                  required:
                    - type
                    - attributes
              required:
                - data
        description: The credentials of the OpenStack Swift cloud provider.
        required: true
      responses:
        '200':
          description: >-
            Successfully returned the list of the OpenStack Swift regions with
            their storage URL.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_172
                type: object
                properties:
                  data: &ref_173
                    type: object
                    properties:
                      type:
                        type: string
                        description: The type of entity to fetch.
                        enum:
                          - swiftRegionResponse
                      attributes:
                        type: object
                        properties:
                          providerId:
                            type: string
                            description: >-
                              The unique identifier of the cloud storage
                              provider.
                          providerName:
                            type: string
                            description: The name of the cloud storage provider.
                          authType:
                            type: string
                            description: >-
                              The authentication type for the cloud storage
                              provider.
                          regionDetails:
                            type: array
                            items: &ref_174
                              type: object
                              properties:
                                name:
                                  type: string
                                  description: >-
                                    The storage region name of the cloud storage
                                    provider.
                                storageUrl:
                                  type: string
                                  description: >-
                                    The storage URL of the cloud storage
                                    provider.
                              required:
                                - name
                                - storageUrl
                        required:
                          - providerId
                          - providerName
                          - authType
                          - regionDetails
                    required:
                      - type
                      - attributes
        '400': &ref_4
          description: Bad request.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: *ref_0
        '401': *ref_2
  /storage/cloud/providers:
    get:
      description: >
        Fetches the list of all cloud storage providers.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|CLOUD|PROVIDERS|`\

        Requires Operation: `|OPERATIONS|VIEW|
      tags:
        - Cloud Providers
      parameters:
        - name: filter
          description: >
            Filter criteria syntax is based on OData standards. Filtering is
            supported on the following attributes:

            |Name|Supported Operators|Description|Schema|

            |---|---|---|---|

            |apiType|eq ne gt ge lt le and or not () contains endswith
            startswith tolower toupper|The api type supported by the cloud
            storage provider. For example, S3.|string|

            |providerName|eq ne gt ge lt le and or not () contains endswith
            startswith tolower toupper|The name of the cloud storage
            provider.|string|

            |description|eq ne gt ge lt le and or not () contains endswith
            startswith tolower toupper|The description of the cloud storage
            provider.|string|
          in: query
          required: false
          schema:
            type: string
        - name: sort
          description: >
            Sort the response data in ascending or descending order on the
            specified attribute. Prefix with `-` for descending order.

            The value of this parameter must be a comma-separated list of sort
            fields in the order they are to be sorted.

            Sorting is supported on the following attributes:

            |Name|

            |---|

            |apiType|

            |providerName|

            |description|
          in: query
          required: false
          schema:
            type: string
        - name: 'page[limit]'
          description: The number of cloud storage provider records on one page.
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: 'page[offset]'
          description: The offset of cloud storage provider records.
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Successfully returned the list of cloud providers.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_110
                type: object
                properties:
                  data:
                    type: array
                    items: &ref_6
                      type: object
                      required:
                        - links
                        - type
                        - id
                        - attributes
                      properties:
                        links:
                          type: object
                          properties:
                            self: &ref_7
                              type: object
                              properties:
                                href:
                                  type: string
                        type:
                          type: string
                          description: Type of the object for the cloud storage provider.
                          enum:
                            - cloudProvider
                        id:
                          type: string
                          description: The unique identifier of the cloud storage provider.
                        attributes:
                          type: object
                          properties:
                            providerName:
                              type: string
                              description: The name of the cloud storage provider.
                            apiType:
                              type: string
                              description: The cloud storage provider API type.
                            description:
                              type: string
                              description: The description of the cloud storage provider.
                            needTokenRenew:
                              type: boolean
                              description: >-
                                If set to `true`, the cloud storage provider has
                                a token that requires renewal. Used with
                                Recovery Vault.
                            encryptionSupported:
                              type: boolean
                              description: >-
                                If set to `true`, the cloud storage provider
                                supports encryption.
                            serverSideEncryptionSupported:
                              type: boolean
                              description: >-
                                If set to `true`, the cloud storage provider
                                supports controlling server-side encryption from
                                NetBackup by HTTP headers.
                            compressionSupported:
                              type: boolean
                              description: >-
                                If set to `true`, the cloud storage provider
                                supports compression.
                            customInstanceSupported:
                              type: boolean
                              description: >-
                                If set to `true`, the cloud storage provider
                                supports custom instance.
                            deduplicationSupported:
                              type: boolean
                              description: >-
                                If set to `true`, the cloud storage provider
                                supports deduplication.
                            dedupeDetails: &ref_162
                              type: object
                              description: The deduplication configuration details.
                              properties:
                                defaultDeduplicationChunkSizeMegaBytes:
                                  type: integer
                                  format: int64
                                  description: 'The chunk size for deduplication, in MB.'
                                deduplicationWriteBufferSizeRangeMegaBytes:
                                  type: integer
                                  format: int64
                                  description: >-
                                    The write buffer size range for
                                    deduplication, in MB.
                                deduplicationReadBufferSizeRangeMegaBytes:
                                  type: integer
                                  format: int64
                                  description: >-
                                    The read buffer size range for
                                    deduplication, in MB.
                            defaultChunkSizeMegaBytes:
                              type: integer
                              description: The default chunk size provided in MB.
                            defaultReadBufferSizeMegaBytes:
                              type: integer
                              description: >-
                                The default buffer size to use for read
                                operations, in MB.
                            defaultWriteBufferSizeMegaBytes:
                              type: integer
                              description: >-
                                The default buffer size to use for write
                                operations, in MB.
                            writeBufferSizeRangeMegaBytes:
                              type: string
                              description: The write buffer size range in MB.
                            readBufferSizeRangeMegaBytes:
                              type: string
                              description: The read buffer size range in MB.
                            providerPortalUrl:
                              type: string
                              description: >-
                                The portal URL provided by the cloud storage
                                provider.
                            sslDetails: &ref_157
                              type: object
                              description: The SSL and non-SSL configuration parameters.
                              properties:
                                supportedSslModes:
                                  type: array
                                  description: >-
                                    The list of SSL modes supported by the cloud
                                    storage providers.
                                  items:
                                    type: string
                                defaultSSLMode:
                                  type: string
                                  description: >
                                    The SSL mode used for user authentication or
                                    data transfer between NetBackup and the
                                    cloud storage provider.
                                  enum:
                                    - DATA
                                    - AUTH
                                    - NONE
                                defaultCheckCertificateRevocation:
                                  type: boolean
                                  description: >-
                                    If set to `true`, the certificate revocation
                                    check is enabled.
                            urlAccessStyleDetails: &ref_159
                              type: object
                              description: >-
                                The URL access styles supported by the cloud
                                storage provider.
                              properties:
                                supportedUrlAccessStyles:
                                  type: array
                                  description: >-
                                    The URL access styles supported by the cloud
                                    storage provider.
                                  items:
                                    type: string
                                defaultUrlAccessStyle:
                                  type: string
                                  description: >-
                                    The default URL access style supported for
                                    the cloud storage provider.
                            curlDetails: &ref_156
                              type: object
                              description: The cURL  details for the cloud storage server.
                              properties:
                                isCurlLoggingEnabled:
                                  type: boolean
                                  description: 'If set to `true`, cURL  logging is enabled.'
                                curlTimeOutSeconds:
                                  type: integer
                                  description: >
                                    The maximum time to allow for the completion
                                    of a data operation. If the operation does
                                    not complete in the specified time, the
                                    operation fails. To disable this timeout,
                                    set the value to 0.
                                curlConnectionTimeOutSeconds:
                                  type: integer
                                  description: >
                                    The amount of time that is allocated for the
                                    media server to connect to the cloud storage
                                    server. This only limits the connection
                                    time, not the session time. If the media
                                    server cannot connect to the cloud storage
                                    server in the specified time, the job fails.
                            isObjectOverwriteAllowed:
                              type: boolean
                              description: >-
                                If set to `true`, the cloud storage provider
                                allows objects to be overwritten.
                            authenticationApiVersion:
                              type: integer
                              description: >-
                                The authentication API version supported by the
                                cloud storage provider.
                            supportedAuthTypes:
                              type: array
                              items: &ref_114
                                type: object
                                description: >-
                                  The supported authentication type by the cloud
                                  storage providers.
                                properties:
                                  accessKey: &ref_115
                                    type: array
                                    description: >-
                                      The access key authentication details for
                                      the cloud storage provider.
                                    items:
                                      type: string
                                  credentialBroker: &ref_116
                                    type: array
                                    description: >-
                                      The credential broker authentication
                                      details for the cloud storage provider.
                                    items:
                                      type: string
                                  awsIdentityRole: &ref_117
                                    type: array
                                    description: >-
                                      The AWS IAM role details for the Amazon
                                      and Amazon Gov Cloud.
                                    items:
                                      type: string
                                  v2Identity: &ref_118
                                    type: object
                                    description: >-
                                      The V2 identity authentication details for
                                      the cloud storage provider.
                                    properties:
                                      locations:
                                        type: array
                                        items: &ref_3
                                          type: object
                                          description: >-
                                            The authentication location details for
                                            the cloud storage provider.
                                          properties:
                                            authenticationLocationName:
                                              type: string
                                              description: >-
                                                The authentication location name for the
                                                cloud storage provider.
                                            authenticationLocationId:
                                              type: string
                                              description: >-
                                                The authentication location identifier
                                                for the cloud storage provider.
                                            authenticationLocationUrl:
                                              type: string
                                              description: >-
                                                The authentication location URL provided
                                                by the cloud storage provider.
                                      tenantDetails:
                                        type: array
                                        items:
                                          type: string
                                      userAccessDetails:
                                        type: array
                                        items:
                                          type: string
                                  v3Identity: &ref_119
                                    type: object
                                    description: >-
                                      The V3 identity authentication details for
                                      the cloud storage provider.
                                    properties:
                                      locations:
                                        type: array
                                        items: *ref_3
                                      userAccessDetails:
                                        type: array
                                        items:
                                          type: string
                                      projectDetails:
                                        type: array
                                        items:
                                          type: string
                                  noneIdentity: &ref_120
                                    type: object
                                    description: >-
                                      The details for the cloud storage provider
                                      with the identity type `none`.
                                    properties:
                                      locations:
                                        type: array
                                        items: *ref_3
                                      userAccessDetails:
                                        type: array
                                        items:
                                          type: string
                            supportedProxytypes:
                              type: array
                              items:
                                type: string
                            providerRegionDetails: &ref_112
                              type: array
                              description: >-
                                The region details for Amazon S3 or for
                                Microsoft Azure API type supported cloud
                                providers.
                              items:
                                type: object
                                required:
                                  - serviceEndpoint
                                properties:
                                  instanceName:
                                    type: string
                                    description: The cloud instance name.
                                  serviceEndpoint:
                                    type: string
                                    description: The cloud service provider endpoint.
                                  urlAccessStyle:
                                    type: string
                                    description: |
                                      The URL access style for the endpoint.
                                    enum:
                                      - PATH_STYLE
                                      - VIRTUAL_STYLE
                                  httpPort:
                                    type: integer
                                    description: The HTTP port details.
                                  httpsPort:
                                    type: integer
                                    description: The HTTPS port details.
                                  userCreated:
                                    type: boolean
                                    readOnly: true
                                    description: >-
                                      Only user created instances can be
                                      modified.
                                  s3RegionDetails: &ref_113
                                    type: array
                                    description: >-
                                      The region details for Amazon S3 API type
                                      cloud providers.
                                    items:
                                      type: object
                                      required:
                                        - serviceHost
                                      properties:
                                        serviceHost:
                                          type: string
                                          description: The cloud service provider host.
