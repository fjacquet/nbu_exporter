            application/vnd.netbackup+json;version=10.0:
              schema: *ref_71
        '401': *ref_2
        '404': &ref_72
          description: No entity found.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: *ref_0
        '406': *ref_64
        '500': *ref_12
    delete:
      description: >
        Cancels an ongoing bulk drive request, specified by `requestId`, and
        retrieves its status.


        Regardless of the outcome of the individual drive records, after this
        call, that request

        and all of its records will immediately be deleted and can no longer be
