                    Note: Should be NONE when volumeCounts is 1. Cannot be NONE
                    when volumeCounts is greater than 1.
                  enum:
                    - NONE
                    - CHAR0DIG6
                    - CHAR1DIG5
                    - CHAR2DIG4
                    - CHAR3DIG3
                    - CHAR4DIG2
                  example: CHAR3DIG3
                volume: &ref_247
                  type: object
                  required:
                    - firstMediaId
