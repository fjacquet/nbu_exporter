                                          format is \WEEK:DAY\. WEEK is the number
                                          of the week within the month.  Possible
                                          values for WEEK are 1 2 3 and 4. DAY is
                                          the day of the week.  Possible values
                                          for DAY are 1 (Sunday) through 7
                                          (Saturday).
                                      maxItems: 35
                                    specificDates:
                                      type: array
                                      description: A list of specific dates.
                                      items:
                                        type: string
                                        format: date
                                        description: >
                                          The specific dates to exclude, in ISO
                                          8601 format. Note: This date represents
                                          the time zone for the primary server.
                                          For example, "2022-10-25T00:00:00.000Z"
                                          is equivalent to "10/25/2022 12:00:00
                                          AM" in the primary server's time zone.
                                        example: 2023-08-24T13:13:00.000Z
                                startWindow:
                                  type: array
                                  description: >
