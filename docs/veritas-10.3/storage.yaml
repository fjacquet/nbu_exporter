                            useWorm:
                              type: boolean
                              description: >
                                If set to `true`, the WORM (write once read
                                many) feature is configured for the storage
                                unit.
                              default: false
                            capabilities:
                              description: The list of storage unit capabilities.
                              type: array
                              items:
                                type: string
                                description: The name of the storage unit capability.
                            robotType:
                              type: string
