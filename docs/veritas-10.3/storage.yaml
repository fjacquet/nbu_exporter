  /storage/storage-units:
    get:
      description: >
        Returns the list of attributes for all storage units.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-UNITS|`\

        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Storage Units
      parameters:
        - name: filter
          description: >
            Filter criteria syntax is based on OData standards. Filtering is
            supported on the following attributes:

            |Name|Supported Operators|Description|Schema|

            |---|---|---|---|

            |name|eq ne gt ge lt le and or not () contains endswith startswith
            tolower toupper|The storage unit name.|string|

            |storageServerType|eq ne gt ge lt le and or not () contains endswith
            startswith tolower toupper|The storage server type.|string|

            |storageCategory|eq contains tolower toupper|The server category.
            For example, MSDP, CLOUD.|string|

            |storageType|eq contains tolower toupper|The server storage
            type.|string|

            |storageSubType|eq contains tolower toupper|The server storage
            subtype.|string|

            |useWorm|eq|WORM (write once read many) is enabled on storage
            unit.|boolean|

            |wormCapable|eq|WORM (write once read many) is supported on the
            storage.|boolean|

            |accelerator|eq|NetBackup accelerator is supported on the
            storage.|boolean|

            |replicationCapable|eq|Replication is supported on the
            storage.|boolean|

            |replicationSourceCapable|eq|Storage unit can be used as source for
            replicating backup images.|boolean|

            |replicationTargetCapable|eq|Storage unit can be used as a target
            for replicating backup images.|boolean|

            |instantAccessEnabled|eq|Instant access is supported on the
            storage.|boolean|

            |snapshot|eq|Storage unit can be used to hold snapshots.|boolean|

            |mirror|eq|Storage unit can use a mirrored replication
            method.|boolean|

            |independent|eq|Storage unit can use a non-mirrored replication
            method.|boolean|

            |primary|eq|Storage unit is capable of Snapshots from sources
            mounted on a client.|boolean|

            |scaleOutEnabled|eq|Storage unit supports scale-out
            storage.|boolean|

            |isCloudSTU|eq|Storage unit is a cloud storage unit.|boolean|

            |robotType|eq ne|The type of robot that contains the drive.|string|

            |robotNumber|eq ne gt ge lt le and or not|A unique, logical number
            that identifies the robot.|integer|

            |density|eq ne|The media density.|string|

            |multiplexing|eq ne gt ge lt le and or not|The maximum multiplexing
            factor. Multiplexing sends concurrent, multiple backups from one or
            more clients to a single drive. Only applies when the
            storageCategory is set to TAPE.|integer|

            |path|eq ne gt ge lt le and or contains tolower toupper|The full
            path to the disk file system where the data is stored.|string|

            |ndmpHost|eq ne gt ge lt le and or not () contains endswith
            startswith tolower toupper|The NDMP host name. Only applies when the
