                  retentionPeriod:
                    type: number
                    format: int
                    description: The retention period level for the copy.
                  numberOfRestores:
                    type: number
                    format: int
                    description: Specifies the number of restores for the copy.
                  conflicts:
                    type: integer
                    description: conflicts found during database merge
                  originHost:
                    type: string
                    description: >-
                      This attribute indicates the origin host name in the EMM
