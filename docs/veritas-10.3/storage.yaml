            |freeCapacityBytes|

            |totalCapacityBytes|

            |usedCapacityBytes|

            |maxFragmentSizeMegabytes|

            |maxConcurrentJobs|

            |maxConcurrentDrives|

            |onDemandOnly|

            |useWorm|

            |wormCapable|

            |robotType|

            |robotNumber|

            |density|

            |multiplexing|

            |path|

            |ndmpHost|

            |enableBlockSharing|

            |transferThrottle|

            |fileSystemExport|
