                                - D3200
                                - D6250
                                - DHCART
                                - DDD8MM
                                - DT120
                                - DODISKWM
                                - DODISKWO
                                - DCDD8MM
                                - D4MM
                                - DDLT
                                - DHCART2
                                - DDLT2
                                - D8MM
                                - D8MM2
                                - DD2
                                - DDTF
                                - DHCART3
                                - DDLT3
                                - D8MM3
                                - NA
                            multiplexing:
