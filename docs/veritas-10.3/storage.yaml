                    type: string
                    description: >-
                      The name of the volume pool that is associated with the
                      copy.
                    example: myVolumePool
                  mounts:
                    type: integer
                    description: The number of mounts for the disk volume
                  timeAssigned:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates the date and time
