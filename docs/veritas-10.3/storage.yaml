                  application: &ref_245
                    type: string
                    enum:
                      - NETBACKUP
                      - OLD_CATALOG
                      - ADDON
                      - CATALOG
                    description: |
                      Type of the application.
                  maxMounts:
                    type: integer
                    description: >-
                      Specifies maximum number of mounts that are allowed for
                      this volume. Zero (default) is the same as unlimited.
                    default: 0
                  firstMount:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates when the media was
                      first mounted.
                  lastMount:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates when the media was
                      last mounted.
                  volumeExpiration:
                    type: string
                    format: date-time
                    description: The ISO 8601 timestamp that indicates volume expiration.
                  cleaningsRemaining:
                    type: integer
                    description: >-
                      Specifies as to how many times more the cleaning media can
                      be used.
                  created:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates when the media is
                      created.
                  description:
                    type: string
                    description: Specifies the media description for the volume.
                    example: test description for volume
                  vaultName:
                    type: string
                    description: Specifies the name of the vault.
                    example: MyVault
                  dateVaulted:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates when the media was
                      sent to offsite storage.
                  returnDate:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates time the media was
                      returned from offsite.
                  vaultSlot:
                    type: integer
                    description: >-
                      This attribute specifies the physical slot number where
                      the given piece of media resides.
                  sessionId:
                    type: integer
                    description: Specifies the ID of a vault session.
                  vaultContainerId:
                    type: string
                    description: >-
                      This attribute represents a vaultContainerId for the vault
                      container that stores the volumes, a string of upto 29
                      alphanumeric characters.
                    maxLength: 29
                  dateExpiration:
                    type: string
                    format: date-time
                    description: The ISO 8601 timestamp that indicates the expiration date.
                  lastWritten:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates the date and time
                      that this media server was last Written onto.
                  lastRead:
                    type: string
                    format: date-time
                    description: >-
                      The ISO 8601 timestamp that indicates the date and time
                      that this media server was last read.
                  kiloBytes:
                    type: number
                    format: long
                    description: Specifies the total space used on this tape .
                  images:
                    type: number
                    format: int
                    description: >-
                      This attribute specifies the number of images on this
