                                  type: integer
                                  default: 1
                                  maximum: 4096
                                  minimum: 0
                          properties:
                            name:
                              type: string
                              description: The name of the storage unit.
                            storageType:
                              type: string
                              description: The type of the storage unit.
                            storageSubType:
                              type: string
                              description: The subtype of the storage unit.
                            storageServerType:
                              type: string
                              description: >-
                                The type of the storage server associated with
                                this storage unit.
