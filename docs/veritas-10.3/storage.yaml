                                longTermRetentionDetails: &ref_28
                                  type: object
                                  description: >
                                    The long-term retention details, part of the
                                    storage server configuration properties, for
                                    the GLACIER and the LIFECYCLE storage class.
                                  properties:
                                    uploadClass:
                                      type: string
                                      description: >
                                        The storage class where the images will
                                        be uploaded. Obtain this value with the
                                        `storage/cloud/providers` API.
                                      enum:
                                        - STANDARD
                                        - STANDARD_IA
                                    retrievalRetentionDays:
                                      type: integer
                                      description: >-
                                        The retrieval retention period (in
                                        days). This is applicable only for
                                        LIFECYCLE and GLACIER storage class.
                                    transitionToStandardIA:
                                      type: object
                                      properties:
                                        transitionRequired:
                                          description: >
                                            If this attribute is set to `true`, the
                                            transition is done to STANDARD-IA
                                            storage class.

                                            If uploadClass attribute is set to
                                            `STANDARD_IA` then set this attribute to
                                            `false`.
                                          type: boolean
                                          default: true
                                        afterDays:
                                          type: integer
                                          description: >-
                                            The time period (in days) after which
                                            the data must transition to the
                                            STANDARD-IA storage class. This is
                                            applicable only for the LIFECYCLE
                                            storage class.
                                    transitionToGlacier:
                                      type: object
                                      properties:
                                        transitionRequired:
                                          description: >-
                                            If set to `true`, the transition is done
                                            to GLACIER storage class.
                                          type: boolean
                                          default: true
                                        afterDays:
                                          type: integer
                                          description: >-
                                            The time period (in days) after which
                                            the data must transition to the GLACIER 
                                            storage class. This is applicable only
                                            for the LIFECYCLE storage class.
                                curlDetails: &ref_29
                                  type: object
                                  description: >-
                                    The cURL  details for the cloud storage
                                    server.
                                  properties:
                                    curlLoggingEnabled:
                                      type: boolean
                                      default: false
                                      description: >-
                                        If set to `true`, cURL  logging is
                                        enabled.
                                    curlTimeOutSeconds:
                                      type: integer
                                      description: >
                                        The maximum time to allow for the
                                        completion of a data operation. If the
                                        operation does not complete in the
                                        specified time, the operation fails. To
                                        disable this timeout, set the value to
                                        0.
                                      default: 900
                                      minimum: 0
                                      maximum: 10000
                                    curlConnectionTimeOutSeconds:
                                      type: integer
                                      description: >
                                        The amount of time that is allocated for
                                        the media server to connect to the cloud
                                        storage server. This only limits the
                                        connection time, not the session time.
                                        If the media server cannot connect to
                                        the cloud storage server in the
                                        specified time, the job fails.
                                      default: 300
                                      minimum: 1
                                      maximum: 10000
                                sslDetails: *ref_26
                                proxyServerDetails: *ref_22
                                encryptionDetails: &ref_194
                                  type: object
                                  description: The encryption details for cloud storage.
                                  properties:
                                    version:
                                      type: integer
                                      description: The encryption version used.
                                    verboseEnabled:
                                      type: boolean
                                      description: >-
                                        If set to `true`, verbose logging is
                                        enabled.
                                  required:
                                    - version
                                    - verboseEnabled
                                kmsAttributes: &ref_195
                                  type: object
                                  description: >-
                                    NetBackup Key Management Service (KMS)
                                    configuration details.
                                  properties:
                                    kmsServerName:
                                      type: string
                                      description: >-
                                        The server name of Key Management
                                        Service (KMS).
                                    keyVersion:
                                      type: integer
                                      description: >-
                                        The version of Key Management Service
                                        (KMS).
                                  required:
                                    - kmsServerName
                                    - keyVersion
                            cloudCatalystAttributes: &ref_203
                              type: object
                              description: The CloudCatalyst configuration properties.
                              properties:
                                esfsHost:
                                  type: string
                                  description: >-
                                    The host on which CloudCatalyst is
                                    configured.
                                cloudBucketName:
                                  type: string
                                  description: >-
                                    The configured cloud storage bucket used in
                                    CloudCatalyst.
                                dedupeToCloud:
                                  type: boolean
                                  description: >-
                                    If set to `true`, deduplication to cloud is
                                    enabled.
                              required:
                                - esfsHost
                                - cloudBucketName
                                - dedupeToCloud
                            openStorageAttributes: &ref_202
                              type: object
                              description: >-
                                The OpenStorage storage server configuration
                                details.
                              properties:
                                storageServerType:
                                  type: string
                                  description: >-
                                    The OpenStorage storage server type. This
                                    value is provided by OpenStorage vendor.
                              required:
                                - storageServerType
                            advancedDiskAttributes: &ref_33
                              type: object
                              description: >-
                                The Advanced Disk storage server configuration
                                details.
                              properties:
                                isPreferredForRestore:
                                  type: boolean
                                  description: >-
                                    If set to `true`, the storage server is used
                                    for the read operations during restore.
                                  default: false
                                isRequiredForRestore:
                                  type: boolean
                                  description: >-
                                    If set to `true`, the storage server is used
                                    for the read operations during restore.
                                  default: false
                                isRequiredForDuplication:
                                  type: boolean
                                  description: >-
                                    If set to `true`, the storage server is used
                                    for the read operations during duplication.
                                  default: false
                            extendedCapabilities:
                              description: >-
                                The list of MSDP storage server extended
                                capabilities.
                              type: array
                              items:
                                type: string
                                description: >-
                                  The name of the MSDP storage server
                                  capability.
                          required:
                            - name
                            - storageCategory
                            - sType
                            - additionalMediaServersDetails
                            - encryptionEnabled
                            - kmsEnabled
                            - isSnapshotSupported
                            - isAcceleratorSupported
                            - isAIRSupported
                            - storageServerCapabilities
                            - storageServerState
                            - isWormSupported
                            - isUshareSupported
                      required:
                        - links
                        - type
                        - id
                        - attributes
                  links: *ref_17
                  meta:
                    type: object
                    properties:
                      pagination: *ref_8
                required:
                  - data
                  - links
                  - meta
        '401': *ref_2
        '500': *ref_12
    post:
      description: >
        Creates a storage server in NetBackup with specified attributes.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-SERVERS|`\

        Requires Operation: `|OPERATIONS|ADD|`
      tags:
        - Storage Servers
      requestBody:
        content:
          application/vnd.netbackup+json;version=10.0:
            schema: &ref_169
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      description: The type of entity to create.
                      enum:
                        - storageServer
                    id:
                      type: string
                      description: >-
                        The unique identifier associated with the storage
                        server.
                    attributes:
                      type: object
                      properties:
                        name:
                          type: string
                          description: The name of the storage server to be created.
                        storageCategory:
                          type: string
                          description: The storage category of the storage server.
                          enum:
                            - ADVANCED_DISK
                            - CLOUD
                            - CLOUD_CATALYST
                            - MSDP
                            - OPEN_STORAGE
                        mediaServerDetails: *ref_15
                        additionalMediaServersDetails: &ref_37
                          type: array
                          description: Details of the additional media servers to be added.
                          items: *ref_15
                        encryptionEnabled:
                          type: boolean
                          default: false
                          description: 'If set to `true`, encryption is enabled.'
                        kmsEnabled:
                          type: boolean
                          default: false
                          description: >
                            If this attribute is set to `true`, Key Management
                            Service (KMS) is enabled. This attribute can be
                            provided only if the `encryptionEnabled` setting is
                            set to true.
                        kmsKeyGroupName:
                          type: string
                          description: >
                            The Key Management Service (KMS) key group name to
                            be set for MSDP storage server. This attribute is
                            mandatory if the `kmsEnabled` setting is set to true
                            and needs to be encrypted using KMS.
                        msdpAttributes: &ref_147
                          type: object
                          description: The MSDP storage server configuration details.
                          properties:
                            storagePath:
                              type: string
                              description: The MSDP storage path.
                            deduplicationDBPath:
                              type: string
                              description: The deduplication database path.
                            specificNetworkInterface:
                              type: string
                              description: The name of the specified network interface.
                            credentials: &ref_34
                              type: object
                              description: Storage server credentials configuration.
                              properties:
                                userName:
                                  type: string
                                  description: >-
                                    The user name that NetBackup uses to access
                                    the storage server.
                                password:
                                  type: string
                                  description: The password of the storage server.
                              required:
                                - userName
                                - password
                            imageSharingInCloud:
                              type: boolean
                              default: false
                              description: >-
                                If set to `true`, the MSDP storage server is
                                created for image sharing.
                            additionalAttributes: &ref_148
                              type: object
                              description: Additional storage server information
                              properties:
                                msdpDataVolumes:
                                  type: array
                                  description: List of configured data volumes
                                  items:
                                    type: string
                                sambaSecurityMode:
                                  type: string
                                  enum:
                                    - ADS
                                    - USER
                                    - UNKNOWN
                                  description: >
                                    The SMB authentication mode configured on
                                    the storage server

                                    ADS - Active Directory authentication is
                                    configured

                                    USER - Local User Authentication is
                                    configured

                                    UNKNOWN - Indicates an error in determining
                                    the configured SMB authentication method
                                isKerberosSupported:
                                  type: boolean
                                  default: false
                                  description: >-
                                    The Kerberos authentication service
                                    configured on the storage server
                          required:
                            - storagePath
                            - credentials
                        cloudAttributes: &ref_151
                          type: object
                          description: >
                            The cloud storage server configuration details.
                            CloudCatalyst is enabled only if you specify the
                            `storageCategory` as CLOUD_CATALYST.
                          required:
                            - providerId
                            - cloudCredentials
                          properties:
                            providerId:
                              type: string
                              description: >
                                The cloud provider identifier. To obtain this
                                value, use the `storage/cloud/providers` API.
                            compressionEnabled:
                              type: boolean
                              default: false
                              description: >
                                If set to `true`, compression is enabled. To
                                obtain this value, use the
                                `storage/cloud/providers` API.
                            proxyServerEnabled:
                              type: boolean
                              default: false
                              description: 'If set to `true`, the proxy server is enabled.'
                            serviceEndpoint:
                              type: string
                              description: >
                                The service endpoint for the cloud service
                                provider.

                                This parameter is required for S3 cloud
                                providers which support only authentication api
                                version 2.
                            urlAccessStyle:
                              type: string
                              description: >
                                The URL access style. To obtain this value, use
                                the `storage/cloud/providers` API.
                              enum:
                                - PATH_STYLE
                                - VIRTUAL_STYLE
                            serverSideEncryptionEnabled:
                              type: boolean
                              default: false
                              description: >-
                                If set to `true`, the server-side encryption is
                                enabled.
                            storageClass:
                              type: string
                              description: >
                                The storage class to be configured. To obtain
                                this value, use the `storage/cloud/providers`
                                API.
                            storageTier:
                              type: string
                              description: >
                                The storage tier to configure for Microsoft
                                Azure. To obtain this value, use the
                                `storage/cloud/providers` API.
                            readBufferSizeBytes:
                              type: integer
                              description: >
                                The buffer size to use for read operations. To
                                obtain this value, use the
                                `storage/cloud/providers` API.
                            writeBufferSizeBytes:
                              type: integer
                              description: >
                                The buffer size to use for write operations. To
                                obtain this value, use the
                                `storage/cloud/providers` API.
                            objectSizeMegabytes:
                              type: integer
                              description: >
                                The object size to configure. To obtain this
                                value, use the `storage/cloud/providers` API.
                            swiftStorageRegionName:
                              type: string
                              description: >
                                The storage region name for the OpenStack Swift
                                API type cloud providers.
                            s3RegionDetails: *ref_25
                            customHeaderDetails: *ref_27
                            longTermRetentionDetails: *ref_28
                            curlDetails: *ref_29
                            sslDetails: *ref_26
                            proxyServerDetails: *ref_22
                            cloudCredentials: &ref_164
                              type: object
                              description: >-
                                The cloud credentials according to the
                                authentication type.
                              required:
                                - authType
                              properties:
                                authType:
                                  type: string
                                  description: >
                                    The authentication type for cloud service
                                    provider. Provide cloud credentials
                                    accordingly. Obtain this value with the
                                    `storage/cloud/providers` API.
                                  enum:
                                    - ACCESS_KEY
                                    - CREDENTIAL_BROKER
                                    - CREDENTIAL_ROLE
                                    - IDENTITY_NONE
                                    - IDENTITY_V2
                                    - IDENTITY_V3
                                accessKeyDetails: &ref_39
                                  type: object
                                  description: >-
                                    The credentials configuration details for an
                                    Amazon S3 or an Azure cloud storage server.
                                  properties:
                                    userName:
                                      type: string
                                      description: >-
                                        The user name for the cloud storage
                                        server. Required if useCms flag is not
                                        set `true` in cloud provider attributes.
                                    password:
                                      type: string
                                      description: >-
                                        The password for the cloud storage
                                        server. Required if useCms flag not set
                                        `true` in cloud provider attributes.
                                    cmsCredName:
                                      type: string
                                      description: >
                                        The CMS credential name that points to
                                        the credentials for the cloud storage
                                        server. Required if useCms flag is
                                        `true` in cloud provider attributes.
                                credentialBroker: &ref_40
                                  type: object
                                  description: >-
                                    Credential broker options for Amazon
                                    Government cloud storage.
                                  required:
                                    - serviceUrl
                                    - agency
                                    - missionName
                                    - role
                                    - certificateFileName
                                    - privateKeyFileName
                                  properties:
                                    serviceUrl:
                                      type: string
                                      description: The service URL.
                                    agency:
                                      type: string
                                      description: The agency.
                                    missionName:
                                      type: string
                                      description: The mission name.
                                    role:
                                      type: string
                                      description: The role.
                                    certificateFileName:
                                      type: string
                                      description: >
                                        The certificate file name. The file must
                                        reside at the following location - On
                                        Windows - install_dir\db\cloud On Unix -
                                        install_dir/db/cloud
                                    privateKeyFileName:
                                      type: string
                                      description: The private key file name.
                                    privateKeyPassPhrase:
                                      type: string
                                      description: >-
                                        The private key passphrase. This
                                        parameter is optional and must not
                                        exceed 100 characters.
                                awsIdentityRole: &ref_41
                                  type: object
                                  description: >-
                                    The AWS IAM role details for the cloud
                                    storage provider.
                                  required:
                                    - awsIdentityRoleType
                                  properties:
                                    awsIdentityRoleType:
                                      type: string
                                      description: >
                                        The type of AWS IAM roles used for
                                        authentication. EC2_ROLE - Use the role
                                        that is assigned to the Amazon EC2
                                        instance.
                                      enum:
                                        - EC2_ROLE
                                v2Identity: *ref_30
                                v3Identity: *ref_31
                                noneIdentity: &ref_168
                                  type: object
                                  description: >-
                                    Swift cloud storage server credentials
                                    configuration for identity version `NONE`
                                    and authentication type is `IDENTITY_NONE`.
                                  required:
                                    - authenticationDetails
                                    - userCredentialsDetails
                                  properties:
                                    authenticationDetails: *ref_1
                                    userCredentialsDetails: *ref_32
                        cloudCatalystAttributes: &ref_150
                          type: object
                          description: >
                            CloudCatalyst specific configuration details. To
                            enable CloudCatalyst, specify both `cloudAttributes`
                            and `cloudCatalystAttributes`.
                          required:
                            - localCacheDirectoryPath
                          properties:
                            localCacheDirectoryPath:
                              type: string
                              description: The CloudCatalyst local cache directory path.
                        advancedDiskAttributes: *ref_33
                        openStorageAttributes: &ref_149
                          type: object
                          description: >-
                            The OpenStorage storage server configuration
                            details.
                          properties:
                            storageServerType:
                              type: string
                              description: >
                                The OpenStorage storage server type. Obtain the
                                value of this attribute from the
                                NetBackup-certified OpenStorage vendor.
                            credentials: *ref_34
                          required:
                            - storageServerType
                            - credentials
                      required:
                        - name
                        - storageCategory
                        - mediaServerDetails
                  required:
                    - type
                    - id
                    - attributes
              required:
                - data
        description: Storage Server configuration details.
        required: true
      responses:
        '201':
          description: Successfully created the storage server.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_36
                type: object
                properties:
                  data: *ref_35
                required:
                  - data
        '400': *ref_4
        '401': *ref_2
        '409':
          description: Entity already exists.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: *ref_0
        '500': *ref_12
  '/storage/storage-servers/{storageServerId}':
    parameters:
      - &ref_42
        name: storageServerId
        in: path
        description: The unique identifier of the storage server.
        required: true
        schema:
          type: string
    get:
      description: >
        Returns the attributes of the storage server with the specified storage
        server ID.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-SERVERS|`\

        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Storage Servers
      parameters:
        - name: 'fieldset[storageServer]'
          description: >
            A sparse field set view for a storage server.

            |Name|Description|

            |---|---|

            |minimal| A sparse field set view restricted to the following
            fields: name, storageCategory, sType, additionalMediaServersDetails,
            storageServerState, storageServerCapabilities, isSnapshotSupported,
            isAcceleratorSupported, isAIRSupported, storageUnits,
            extendedCapabilities.
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: >
            Successfully returned the details of the storage server with
            specified storage server ID.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: *ref_36
        '401': *ref_2
        '404':
          description: A storage server with the specified name is not found.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: *ref_0
        '500': *ref_12
    patch:
      description: >
        Modify a storage server in NetBackup with specified attributes.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-SERVERS|`\

        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Storage Servers
      requestBody:
        content:
          application/vnd.netbackup+json;version=10.0:
            schema: &ref_188
              type: object
              properties:
                data: &ref_207
                  type: object
                  properties:
                    type:
                      type: string
                      description: The type of entity to modify.
                      enum:
                        - storageServer
                    attributes:
                      type: object
                      properties:
                        kmsKeyGroupName:
                          type: string
                          description: >
                            The Key Management Service (KMS) key group name to
                            be set for MSDP storage server.
                        reloadStsConfig:
                          type: boolean
                          description: >
                            When set to true, storage server configuration in
                            database will be updated with information from the
                            underlying storage. No changes are made to the
                            underlying storage. When not set or set to false,
                            this attribute will be ignored. When true but other
                            attributes are also set, this attribute will be
                            ignored.
                        additionalMediaServersDetails: *ref_37
                        msdpAttributes: &ref_208
                          type: object
                          description: >-
                            The configuration details to modify for the MSDP
                            storage server.
                          properties:
                            spaLogRetention:
                              type: integer
                              description: >-
                                The log retention value (in days) for the
                                storage pool.
                            verboseLevel:
                              type: integer
                              minimum: 0
                              maximum: 5
                              description: The logging verbose level for the storage pool.
                            credentials: *ref_34
                        cloudAttributes: &ref_209
                          type: object
                          description: >-
                            The configuration details to modify for the cloud
                            storage server.
                          properties:
                            proxyServerEnabled:
                              type: boolean
                              description: >
                                If set to `true`, the proxy server is enabled.
                                Provide proxy server details if this flag is set
                                to `true`.
                            serverSideEncryptionEnabled:
                              type: boolean
                              description: >-
                                If set to `true`, the server-side encryption is
                                enabled.
                            readBufferSizeBytes:
                              type: integer
                              format: int64
                              description: >
                                The buffer size to use for read operations.
                                Obtain this value with the
                                `storage/cloud/providers` API.
                            writeBufferSizeBytes:
                              type: integer
                              format: int64
                              description: >
                                The buffer size to use for write operations.
                                Obtain this value with the
                                `storage/cloud/providers` API.
                            offlineTransferDetails: *ref_38
                            longTermRetentionDetails: &ref_212
                              type: object
                              description: >
                                The long-term retention storage server
                                configuration properties for GLACIER and
                                LIFECYCLE storage class.
                              properties:
                                uploadClass:
                                  type: string
                                  description: >
                                    The storage class where the images are
                                    uploaded. Obtain this value with the
                                    `storage/cloud/providers` API.
                                  enum:
                                    - STANDARD
                                    - STANDARD_IA
                                retrievalRetentionDays:
                                  type: integer
                                  description: The retrieval retention period (in days).
                                transitionToStandardIA:
                                  type: object
                                  properties:
                                    transitionRequired:
                                      type: boolean
                                    afterDays:
                                      type: integer
                                      description: >-
                                        The transition to STANDARD-IA storage
                                        class period (in days).
                                transitionToGlacier:
                                  type: object
                                  properties:
                                    transitionRequired:
                                      type: boolean
                                    afterDays:
                                      type: integer
                                      description: >-
                                        The transition to GLACIER storage class
                                        period (in days).
                            curlDetails: &ref_211
                              type: object
                              description: The cURL details for the cloud storage server.
                              properties:
                                curlLoggingEnabled:
                                  type: boolean
                                  description: >-
                                    If set to `true`, cURL logging is enabled or
                                    not.
                                curlTimeOutSeconds:
                                  type: integer
                                  description: >-
                                    The maximum time for the completion of data
                                    operation.
                                curlConnectionTimeOutSeconds:
                                  type: integer
                                  description: >-
                                    The amount of time that is allocated for the
                                    media server to connect to the cloud storage
                                    server.
                            sslDetails: &ref_48
                              type: object
                              description: >-
                                The SSL details to set SSL and non-SSL
                                configuration parameters.
                              properties:
                                useSSLMode:
                                  type: string
                                  description: >
                                    The SSL mode to use the SSL protocol for
                                    user authentication or data transfer between
                                    NetBackup and cloud storage provider.
                                  enum:
                                    - DATA
                                    - AUTH
                                    - NONE
                                checkCertificateRevocation:
                                  type: boolean
                                  description: >
                                    If set to `true`, certificate revocation
                                    check is performed. This option can be
                                    enabled only if the `useSSLMode` value is
                                    set to `DATA` or `AUTH`.
                            proxyServerDetails: *ref_22
                            cloudCredentials: &ref_213
                              type: object
                              description: >-
                                The cloud credentials as per configured cloud
                                storage server.
                              properties:
                                authType:
                                  type: string
                                  description: >
                                    The authentication type for cloud service
                                    provider. Provide cloud credentials
                                    accordingly. Obtain this value with the
                                    `storage/cloud/providers` API.
                                  enum:
                                    - ACCESS_KEY
                                    - CREDENTIAL_ROLE
                                accessKeyDetails: *ref_39
                                credentialBroker: *ref_40
                                awsIdentityRole: *ref_41
                                v2Identity: &ref_214
                                  type: object
                                  description: >
                                    For Swift cloud storage server, if
                                    authentication type is IDENTITY_V2, provide
                                    credentials of V2 version.
                                  required:
                                    - userCredentialsDetails
                                  properties:
