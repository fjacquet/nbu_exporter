            - SOCKS4
            - SOCKS5
            - SOCKS4A
        proxyTunneling:
          type: boolean
          description: >
            Specifies that HTTP CONNECT requests are used to open a tunnel for
            direct communication to the cloud storage provider. Only application
            when `proxyType` is `HTTP`.
        authenticationType:
          type: string
          description: >
            Specifies the type of authentication to use for the proxy server.
            Only applicable when `proxyType` is `HTTP`.
          enum:
            - NONE
            - BASIC
            - NTLM
        userName:
          type: string
          description: >
            Specifies the user name to use for proxy server authentication. Only
            applicable when `authenticationType` is not `NONE`.
