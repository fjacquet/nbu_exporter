          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_137
                type: object
                properties:
                  data:
                    type: array
                    items: &ref_13
                      type: object
                      properties:
                        links:
                          type: object
                          properties:
                            self: *ref_7
                        type:
                          type: string
                          description: Type of the object.
                          enum:
                            - storageUnit
                        id:
                          type: string
                          description: The name of the storage unit.
                        attributes: &ref_10
                          type: object
                          description: The attributes of the storage unit.
                          oneOf:
                            - &ref_139
                              type: object
