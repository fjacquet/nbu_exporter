    post:
      description: >
        Creates a storage unit in NetBackup. Storage unit creation for types
        TAPE and BASIC_DISK is not supported.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/10.3/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\

        Namespace: `|STORAGE|STORAGE-UNITS|`\

        Requires Operation: `|OPERATIONS|ADD|`
      tags:
        - Storage Units
      requestBody:
        content:
          application/vnd.netbackup+json;version=10.0:
            schema: &ref_124
              type: object
              properties:
                data:
                  type: object
                  properties:
                    type:
                      type: string
                      description: The type of entity to create.
                      enum:
                        - storageUnit
                    attributes: &ref_135
                      type: object
                      properties:
                        name:
                          type: string
                          description: The name of the storage unit.
                        useAnyAvailableMediaServer:
                          description: >-
                            If set to `true`, any available media server can be
                            used. By default, the parameter is set to true.
                          type: boolean
                          default: true
                        mediaServerDetails:
                          type: array
                          description: >-
                            The list of media servers associated with the
                            storage server.
                          items: &ref_15
                            type: object
                            description: Details of the media server.
                            properties:
                              name:
                                type: string
                                description: Name of the media server.
                            required:
                              - name
                        maxFragmentSizeMegabytes:
                          description: >
                            The maximum fragment size in MB. The default and
                            maximum value for MSDP storage is 51200 MB. The
                            default and maximum value for other storage types is
                            524288 MB.
                          type: integer
                          format: int64
                          minimum: 20
                        maxConcurrentJobs:
                          description: >-
                            The maximum number of concurrent jobs. This is not
                            valid for tape storage units. Tape storage units are
                            not currently supported by this API.
                          type: integer
                          default: 1
                          maximum: 4096
                          minimum: 0
                        onDemandOnly:
                          description: >-
                            If set to `true`, the storage unit is available
                            on-demand.
                          type: boolean
                          default: false
                        useWorm:
                          type: boolean
                          default: false
                          description: >
                            If set to `true`, the WORM (write once read many)
                            feature is configured for the storage unit.

                            This feature cannot be reset to false once it is set
                            to true.
                        storageCategory:
                          type: string
                          description: >-
                            Used to provide the storage unit storage category
                            when not providing a disk pool relationship.
                            BASIC_DISK is the only storage category that does
                            not require the disk pool relationship. If NONE is
                            specified then the storage unit storage category
                            will be derived from the required disk pool
                            relationship.
                          enum:
                            - BASIC_DISK
                            - NONE
                        highWaterMark:
                          description: >-
                            Applies only to BASIC_DISK storage units. This
                            threshold triggers the storage unit out of space
                            actions. The high water mark must be greater than
                            the low water mark setting.
                          type: integer
                          default: 98
                          maximum: 100
                          minimum: 2
                        lowWaterMark:
                          description: >-
                            Applies only to BASIC_DISK storage units. Once the
                            high water mark is reached space is created on the
                            storage unit until the low water mark is reached.
                          type: integer
                          default: 80
                          maximum: 99
                          minimum: 1
                      required:
                        - name
                    relationships:
                      type: object
                      properties:
                        diskPool:
                          type: object
                          properties:
                            data: *ref_9
                  required:
                    - type
                    - attributes
              required:
                - data
        description: Storage unit configuration details.
        required: true
      responses:
        '201':
          description: Successfully created the storage unit.
          headers:
            Location:
              description: URI of the created storage unit.
              schema:
                type: string
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: &ref_16
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      links:
                        type: object
                        properties:
                          self: *ref_7
                      type:
                        type: string
                        description: The type of entity to create.
                        enum:
                          - storageUnit
                      id:
                        type: string
                        description: >-
                          The unique identifier associated with the storage
                          unit.
                      attributes: *ref_10
                      relationships:
                        type: object
                        properties:
                          diskPool: *ref_11
                    required:
                      - links
                      - type
                      - id
                      - attributes
                      - relationships
                required:
                  - data
        '400': *ref_4
        '401': *ref_2
        '409':
          description: Entity already exists.
          content:
            application/vnd.netbackup+json;version=10.0:
              schema: *ref_0
        '500': *ref_12
