replicaCount: 1

image:
  repository: ghcr.io/fjacquet/nbu_exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 9440

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: []

existingSecret: ""

# Inline exporter config, rendered into a Secret and mounted at /etc/nbu_exporter/config.yaml.
# Secrets replaced by placeholders — set real values via env vars or an external Secret.
config: |
  server:
    host: "0.0.0.0"
    port: "9440"
    uri: "/metrics"
    scrapingInterval: "1h"
    logName: "stdout"
  nbuserver:
    scheme: "https"
    uri: "/netbackup"
    domain: "my.domain"
    domainType: "NT"
    host: "master.my.domain"
    port: "1556"
    apiVersion: "13.0"
    apiKey: "REPLACE_WITH_API_KEY"
    contentType: "application/vnd.netbackup+json; version=13.0"
    insecureSkipVerify: false
  opentelemetry:
    enabled: false
    endpoint: "localhost:4317"
    insecure: true
    samplingRate: 0.1
  collectors:
    alerts:  { enabled: false }
    malware: { enabled: false }
    catalog: { enabled: false }
    slo:     { enabled: false }

env: []
# - name: NBU1_HOSTNAME
#   value: master.my.domain
# - name: NBU1_APIKEY
#   valueFrom:
#     secretKeyRef:
#       name: my-external-nbu-secret
#       key: nbu-api-key

deploymentAnnotations: {}

podAnnotations:
  prometheus.io/scrape: "false"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "9440"

prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    interval: 15s
    namespace: []
    metricRelabelings: []
    relabelings: []
    targetLabels: []

  rules:
    enabled: false
    additionalLabels: {}
    namespace: ""
    additionalRules: []

  scrapeConfig:
    enabled: false
    additionalLabels: {}
    namespace: ""
    interval: 60s
    scrapeTimeout: 55s
    metricRelabelings: []
    relabelings: []
