---
# Example configuration with automatic API version detection
# The exporter will try versions in order: 14.0 -> 13.0 -> 12.0 -> 3.0
server:
  host: "localhost"
  port: "2112"
  uri: "/metrics"
  scrapingInterval: "1h"
  logName: "stdout" # stdout-only logging (see config.yaml for file-logging notes)
nbuserver:
  scheme: "https"
  uri: "/netbackup"
  domain: "my.domain"
  domainType: "NT"
  host: "master.my.domain"
  port: "1556"
  # apiVersion: omitted for automatic detection
  # The exporter will automatically detect the correct API version
  # by trying: 13.0 (NBU 11.0) -> 12.0 (NBU 10.5) -> 3.0 (NBU 10.0-10.4)
  apiKey: "my-api-key"
  contentType: "application/vnd.netbackup+json" # Version will be added automatically
  insecureSkipVerify: false # Set to true to skip TLS certificate verification (not recommended for production)


# Optional: OpenTelemetry distributed tracing configuration
# opentelemetry:
#     enabled: true
#     endpoint: "localhost:4317"
#     insecure: true
#     samplingRate: 0.1

# Optional: opt-in NetBackup 11.2 metric collectors (all default to disabled)
collectors:
  alerts:  { enabled: false }
  malware: { enabled: false }
  catalog: { enabled: false }
  slo:     { enabled: false }
