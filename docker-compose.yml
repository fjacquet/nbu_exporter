services:
  nbu_exporter: # nosemgrep
    build: .
    image: nbu_exporter:latest
    container_name: nbu_exporter
    security_opt:
      - no-new-privileges:true
    ports:
      - "${NBU_EXPORTER_PORT:-9440}:9440"
    volumes:
      # Mount configuration file (read-only)
      - ./config.yaml:/etc/nbu_exporter/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9440/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Optional: Set resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      # Single-server quickstart: set these in a .env file (gitignored).
      # config.yaml is the source of truth — these vars are only consumed
      # when config.yaml references them as ${NBU1_HOSTNAME} / ${NBU1_APIKEY}.
      # For multiple servers add more entries in config.yaml (literal values
      # or your own env references) rather than extending this block.
      - NBU1_HOSTNAME=${NBU1_HOSTNAME:-master.my.domain}
      - NBU1_APIKEY=${NBU1_APIKEY:-}
    networks:
      - monitoring

  prometheus: # nosemgrep
    image: prom/prometheus:latest
    container_name: prometheus
    security_opt:
      - no-new-privileges:true
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/nbu.rules.yml:/etc/prometheus/rules/nbu.rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    depends_on:
      - nbu_exporter
    networks:
      - monitoring

  grafana: # nosemgrep
    image: grafana/grafana:latest
    container_name: grafana
    security_opt:
      - no-new-privileges:true
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/nbu-overview.json:/var/lib/grafana/dashboards/nbu-overview.json:ro
      - ./grafana/nbu-jobs.json:/var/lib/grafana/dashboards/nbu-jobs.json:ro
      - ./grafana/nbu-storage.json:/var/lib/grafana/dashboards/nbu-storage.json:ro
      - ./grafana/nbu-dataprotection.json:/var/lib/grafana/dashboards/nbu-dataprotection.json:ro
      - ./grafana/nbu-lifecycle.json:/var/lib/grafana/dashboards/nbu-lifecycle.json:ro
      - ./grafana/nbu-tape.json:/var/lib/grafana/dashboards/nbu-tape.json:ro
      - ./grafana/nbu-multisite.json:/var/lib/grafana/dashboards/nbu-multisite.json:ro
      # Companion dashboard (Grafana 1860) — requires a node_exporter scraped alongside.
      - ./grafana/node-exporter-full.json:/var/lib/grafana/dashboards/node-exporter-full.json:ro
      - grafana-storage:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-storage:
