                            name: Security Administrator
                            description: Manages security functionalities.
                          - id: 25
                            name: Backup Operator
                            description: Manages backup operations.
                        expirationDateTime: 2025-11-19T18:30:00.000Z
                        reason: Emergency maintenance access
        '204':
          description: The user has no active role elevations. No content is returned.
        '401': *ref_6
