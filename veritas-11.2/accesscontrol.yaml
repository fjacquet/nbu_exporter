                            items: *ref_34
                          expirationDateTime:
                            description: >
                              Expiration timestamp for the current elevation.

                              The value is in date-time in ISO 8601 format.

                              This field always contains a valid expiration
                              timestamp since the endpoint only returns data
                              when the user is elevated.
                            type: string
                            format: date-time
                          reason:
                            description: >
                              The audit reason or context for the elevation, if
                              provided during the elevation request.

                              This field is optional and may be omitted when no
                              reason was provided during elevation.
