    post:
      tags:
        - Role Elevation
      description: >
        Elevate the currently authenticated user to multiple roles in a single
        request.


        This API enables the authenticated user to request elevation to multiple
        roles simultaneously.

        The user can only elevate their own privileges, not assign roles to
        other users.

        The set of elevatable roles for the current user can be retrieved from
        the following API:

        GET /access-control/user-principals/self/elevatable-roles


        **Important:** A user can elevate to multiple roles at once, but cannot
        add more roles while already elevated.

        To gain an additional role, the user must first de-elevate using DELETE
        /access-control/user-principals/self/role-elevation,

        and then submit a new elevation request with all needed roles.


        Note: As multiperson authorization is always enabled for this operation,
        the response returns an HTTP 202 status code. The ticket link

        is mentioned in the location header of the HTTP response, and the ticket
        ID is provided in the X-NetBackup-MPA-Ticket header.

        For more information, refer to the [multiperson
        authorization](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-multi-person-authorization)
        documentation.


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
      requestBody:
        description: The role elevation request containing role IDs.
        required: true
        content:
          application/vnd.netbackup+json;version=14.0:
            schema: &ref_70
              type: object
              description: >-
                The request body for user role elevation - elevating the current
                user to multiple roles with optional expiration and reason.
              required:
                - data
              properties:
                data: &ref_71
                  description: >-
                    The user role elevation data extending the base with
                    expiration and reason fields.
                  type: object
                  required:
                    - type
                    - attributes
                  properties:
                    type:
                      type: string
                      enum:
                        - userRoleElevationDto
                    id:
                      type: string
                      description: The identifier for the role elevation request.
                    attributes:
                      type: object
                      required:
                        - roleIds
                        - duration
                      properties:
                        roleIds:
                          type: array
                          description: The list of role IDs to elevate the current user to.
                          items:
                            type: string
                          minItems: 1
                          uniqueItems: true
                        duration:
                          description: >
                            Duration until expiration in ISO-8601 duration
                            format (e.g. PT1H, P1D, P1DT2H, P30D).

                            Minimum 1 hour (PT1H), maximum 30 days (P30D).
                          type: string
                          pattern: >-
                            ^P(?:\d+D)?(?:T(?:\d+H)?(?:\d+M)?(?:\d+S)?|T(?:\d+H)?(?:\d+M)?(?:\d+S)?)$
                          example: PT2H
                        reason:
                          description: >-
                            The audit reason or context for the elevation, if
                            provided.
                          type: string
                          maxLength: 100
            examples:
              roleElevation: &ref_95
                value:
                  data:
                    type: userRoleElevationDto
                    id: roleElevation-v1
                    attributes:
                      roleIds:
                        - '11'
                        - '25'
                      duration: PT2H
                      reason: Temporary elevation for maintenance tasks.
      responses:
        '202':
          description: >-
            The request was successfully received by the server and is awaiting
            MPA approval.
          headers:
            X-NetBackup-MPA-Ticket:
              description: >-
                The ticket ID of newly-generated multiperson authorization
                ticket.
              schema:
                type: string
            Location:
              description: >-
                The link to the newly-generated multiperson authorization
                ticket.
              schema:
                type: string
        '204':
          description: Successfully elevated the current user to all specified roles.
        '400':
          description: Bad request.
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_1
              examples:
                alreadyElevated:
                  summary: User already has active elevation
                  value:
                    errorCode: 8961
                    errorMessage: An invalid API request is encountered.
                    attributeErrors: {}
                    fileUploadErrors: []
                    errorDetails:
                      - >-
                        User already has an active elevated role. Cannot elevate
                        to another role.
                invalidRoleIdFormat:
                  summary: Invalid role ID format
                  value:
                    errorCode: 8961
                    errorMessage: An invalid API request is encountered.
                    attributeErrors: {}
                    fileUploadErrors: []
                    errorDetails:
                      - >-
                        '1212Invalid'. Invalid role ID format. Role ID must be a
                        numeric value.
                invalidExpirationDateTime:
                  summary: Invalid expiration date/time
                  value:
                    errorCode: 8961
                    errorMessage: An invalid API request is encountered.
                    attributeErrors: {}
                    fileUploadErrors: []
                    errorDetails:
                      - Expiration date/time must be in the future.
                roleNotFound:
                  summary: Role not found
                  value:
                    errorCode: 227
                    errorMessage: no entity was found
                    attributeErrors: {}
                    fileUploadErrors: []
                    errorDetails:
                      - Role with ID '-1' not found.
        '401': *ref_6
        '409':
          description: >-
            The role is awaiting to be elevated by a request previously made.
            Ticket for that request is not yet approved.
          headers:
            X-NetBackup-Pending-MPA-Ticket:
              description: >-
                The ticket ID of the pending multiperson authorization ticket
                generated by the last 'POST
                /access-control/user-principals/self/role-elevation' request.
              schema:
                type: string
          content:
            application/vnd.netbackup+json;version=14.0:
              schema: *ref_1
        '415': *ref_27
        '500': *ref_7
        '503': *ref_8
    delete:
      tags:
        - Role Elevation
      description: >
        Removes all role elevations for the current authenticated user
        (self-service de-elevation).


        This API enables users to voluntarily end their own privilege escalation
        and return to their base 

        permission level. This is a self-service operation that allows users to
        proactively reduce their 

        elevated privileges when they no longer need them.


        **Use Cases:**

        - Voluntary privilege reduction after completing elevated tasks

        - Security best practice of minimal privilege duration

        - Self-initiated cleanup of temporary elevated access


        **Access Control**\

        Enforcement Type:
        [API-Level](http://sort.veritas.com/public/documents/nbu/11.2/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
      responses:
        '204':
          description: >-
            Successfully removed all role elevations for the current user. User
            has been returned to base permissions.
        '400': *ref_5
        '401': *ref_6
        '404': *ref_15
        '500': *ref_7
        '503': *ref_8
